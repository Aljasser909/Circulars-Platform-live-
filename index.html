<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة التعاميم العقارية</title>
<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial;

}

body{

    background:#f3f6fb;

    padding:25px;

}

.top-bar{

    display:flex;

    justify-content:flex-start;

    margin-bottom:20px;

}

.logo{

    width:130px;

}

.header{

    text-align:center;

    margin-bottom:25px;

}

.header h1{

    color:#1e3a8a;

    font-size:32px;

}

.header p{

    color:#64748b;

    margin-top:8px;

}

.search-container{

    background:white;

    padding:20px;

    border-radius:16px;

    margin-bottom:25px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;

    box-shadow:0px 4px 10px rgba(0,0,0,0.08);

}

select,input{

    padding:10px;

    border-radius:10px;

    border:1px solid #ddd;

    min-width:220px;

}

button{

    background:#2563eb;

    color:white;

    border:none;

    padding:10px 20px;

    border-radius:10px;

    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

.card{

    background:white;

    border-radius:16px;

    padding:25px;

    margin-bottom:25px;

    position:relative;

    box-shadow:0px 4px 12px rgba(0,0,0,0.08);

}

.status-badge{

    position:absolute;

    top:20px;

    left:20px;

    padding:8px 18px;

    border-radius:20px;

    font-size:14px;

    font-weight:bold;

}

.active-status{

    background:#dcfce7;

    color:#166534;

}

.updated-status{

    background:#fef3c7;

    color:#92400e;

}

.cancelled-status{

    background:#fee2e2;

    color:#991b1b;

}

.card-title{

    font-size:28px;

    font-weight:bold;

    color:#1e293b;

    margin-bottom:10px;

}

.version-box{

    background:#eff6ff;

    color:#1d4ed8;

    padding:8px 12px;

    border-radius:12px;

    display:inline-block;

    font-weight:bold;

    margin-bottom:20px;

}

.info-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:12px;

    margin-bottom:20px;

}

.info-box{

    background:#f8fafc;

    padding:15px;

    border-radius:12px;

}

.text-box{

    background:#f8fafc;

    padding:18px;

    border-radius:12px;

    margin-top:15px;

    line-height:2;

}

.history-box{

    margin-top:20px;

    background:#f8fafc;

    padding:15px;

    border-radius:12px;

}

.history-box summary{

    cursor:pointer;

    font-weight:bold;

    color:#2563eb;

}

.old-version{

    background:white;

    padding:15px;

    margin-top:15px;

    border-radius:12px;

}

.no-results{

    text-align:center;

    color:red;

    font-size:18px;

}
</style>
</head>
<body>
<div class="top-bar">
<img src="logo.png" class="logo">
</div>
<div class="header">
<h1>منصة التعاميم العقارية</h1>
<p>عرض التعاميم الحالية والإصدارات السابقة</p>
</div>
<div class="search-container">
<select id="titleFilter">
<option value="">كل العناوين</option>
</select>
<select id="typeFilter">
<option value="">كل أنواع التعميم</option>
</select>
<input type="text" id="keywordFilter" placeholder="بحث بالكلمات المفتاحية">
<input type="date" id="dateFilter">
<button onclick="searchCirculars()">بحث</button>
</div>
<div id="results"></div>

":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"CR-010","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"دمج الزائدة التنظيمية","text":"في حال رغم العميل بدمج زائدة تنظيمية حسب محضر اللجنة الفنية والتقرير المساحي يتم تصحيح بدمج الزائدة التنظيمية عن طريق طلبات التصحيح","source":"الحوكمة","date":"1\/12\/2025","status":"Updated","updateNote":"يتم اتباع اجراء تسجيل الزائدة التنظيمية"},{"mainCode":"CR-010","version":2,"type":"CR","category":"التفاصيل الجيومكانية","title":"توحيد الاستخدام - دمج","text":"في حال تقديم طلب تصحيح بغرض توحيد الاستعمال لعقارات مراد دمجها يتم تعديل استخدام كل قطعة متأثرة بالدمج لتتوافق مع الاستخدام في المحضر بعد الدمج","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 القطع ص 8"},{"mainCode":"CR-010","version":3,"type":"CR","category":"تصحيح","title":"محاضر القصيم - الدمج","text":"فيما يخص محاضر منطقة القصيم التي تم إعادتها من الجيو بتوصية لايمكن التصحيح بناءً على مخططات تم اعتمادها: الحالة الأولى تجزئة = عملية تجزئة، الحالة الثانية بقاء كما هي = تصحيح بيانات وصفية، الحالة الثالثة دمج = تعليق للدراسة.","source":"الحوكمة","date":"10\/14\/2025","status":"Active","updateNote":""},{"mainCode":"CR-011","version":1,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود","text":"في حال رغبة العميل بإزالة القيود عدم البيع والرهن والايجار والعقار مرهون يتم التعديل لـ ( عدم البيع ) عن طريق الانسدنت ريبورت","source":"الحوكمة","date":"4\/1\/1957","status":"Cancelled","updateNote":"الغي التعميم وفقاً للتعميم بالصف 59"},{"mainCode":"CR-011","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة حق الانتفاع - كهرباء","text":"في حال رغبة العميل بإزالة حق الانتفاع لغرفة الكهربا نتيجة تسجيل خاطئ يتم ذلك عن طريق خدمة تجاوز المقابل المالي من خلال عملية إدارة الحقوق والقيود والالتزامات.","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":""},{"mainCode":"CR-012","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح أرقام القطع","text":"يتم تصحيح تقسيم ارقام القطع استناداً على البوابة المكانية او المستكشف الجغرافي لمنطقة العقار","source":"الحوكمة","date":"4\/22\/1957","status":"Updated","updateNote":"حدث التعميم وفقا للتعميم بالصف 62"},{"mainCode":"CR-013","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح رقم القطعة","text":"في حال كان التصحيح لرقم القطعة بناء على البوابة المكانية او الصك فيتم التصحيح","source":"الحوكمة","date":"4\/29\/1957","status":"Updated","updateNote":"حدث التعميم وفقا للتعميم بالصف 63"},{"mainCode":"CR-013","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود - قرار واهب","text":"في حال كان ازالة القيود بناء على قرار من الواهب ، يتم إرفاق الصك الذي يثبت ملكية الواهب لصك السابق من خلال الثروة العقارية","source":"الحوكمة","date":"4\/5\/1958","status":"Active","updateNote":""},{"mainCode":"CR-013","version":3,"type":"CR","category":"التفاصيل الجيومكانية","title":"أولوية مستندات التصحيح","text":"في حال كان طلب تصحيح لرقم القطعة او مخطط او بلوك ، يتم التصحيح بمراعاة الترتيب الاتي: مستند رسمي باستثناء ( القرار المساحي ) الا بوجود خطاب يفيد بصحة التقرير المساحي ، بيانات الأمانة ( الخرائط الداعمة ) ، الصك","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 7"},{"mainCode":"CR-014","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح الاستعمال","text":"يتم تصحيح إستعمال للعقار في حال ذكر بيان الاستعمال في المستند الرسمي ، ولايتم تعديله استناداً على نوع مبنى او نوع البناء.","source":"الحوكمة","date":"5\/8\/2025","status":"Updated","updateNote":""},{"mainCode":"CR-015","version":1,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود - تصحيح","text":"فيما يتعلق بإجراء ازالة القيود : عدم ايجار وعدم رهن وعدم البيع : يتم التصحيح بازالة القيود من خلال طلبات التصحيح ، مع التحقق من صحة ازالة القيود وفقا لاجراءات التسجيل الاول.","source":"الحوكمة","date":"5\/22\/2025","status":"Active","updateNote":""},{"mainCode":"CR-016","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"اختلاف رقم البلوك","text":"في حال اختلاف رقم البلوك بين البيانات المسحوبة والأمانة أو أي خرائط مرجعية، يحق للعميل طلب تصحيح رقم البلوك.","source":"الحوكمة","date":"6\/30\/2025","status":"Updated","updateNote":"حدث التعميم وفقا للتعميم بالصف 63"},{"mainCode":"CR-017","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"نوع وحالة واستعمال العقار","text":"في حال طلب تصحيح لاستعمال او نوع العقار او حالة العقار فيتم تصحيح نوع العقار و استعمال العقار وحالة العقار معاً مع مراعاة عدم الاختلاف","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"CR-017","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"تعديل قيمة الرهن","text":"في حال وجود طلب تصحيح بتعديل قيمة الرهن يتم التعديل من خلال عمليات التصحيح اذا كان تسجيل الحق بشكل خاطئ من خلال التسجيل الاول","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"CR-017","version":3,"type":"CR","category":"التفاصيل الجيومكانية","title":"حالة العقار - مصورات جوية","text":"في حال طلب تصحيح لحالة العقار ، يتم الاستناد على المصورات الجوية من خلال المنصة و الـ PCP فقط ، وفي حال الاختلاف يتم التصحيح بما يتوافق مع مدخل العميل.","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"CR-017","version":4,"type":"CR","category":"التفاصيل الجيومكانية","title":"نوع العقار - وجود مبنى","text":"في حال طلب تصحيح لنوع العقار ، فيتم التصحيح بما يتوافق مع الاستخدام بشرط وجود مبنى بالاستناد على المصورات الجوية من خلال المنصة و ال PCP","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"CR-018","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تعديل بيانات الأمانة - جيومكاني","text":"في حال وجود طلب تعديل بيانات يتم سحبها من الامانه ( اسم حي - اسم مدينه ) يتم إحالة الطلب للجيومكاني للتعديل وفي حال لم يتم التعديل من قبلهم يتم رفض الطلب","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":""},{"mainCode":"CR-018","version":2,"type":"CR","category":"التصحيح","title":"رفع الإيقاف - رفض","text":"في حال طلب العميل رفع الإيقاف من خلال عملية التصحيح، يتم رفض طلب التصحيح واختيار السبب أخرى وصيغة الرفض المحددة","source":"الحوكمة","date":"4\/3\/1959","status":"Active","updateNote":""},{"mainCode":"CR-018","version":3,"type":"CR","category":"تصحيح","title":"رفض تصحيح اسم المدينة","text":"فيما يخص طلبات تصحيح اسم المدينة، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"10\/7\/2025","status":"Active","updateNote":""},{"mainCode":"CR-018","version":4,"type":"CR","category":"تصحيح","title":"رفض تصحيح عرض الشارع","text":"فيما يخص طلبات تصحيح عرض الشارع، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"10\/9\/2025","status":"Active","updateNote":""},{"mainCode":"CR-019","version":1,"type":"CR","category":"البيانات الجيومكانية","title":"طلب تصحيح على أحد المخططين","text":"في حال طلب العميل التعديل بناء على الأمانة والعقار يقع على مخططين وطلب العميل احد المخططين التي يقع عليها العقار فيتم التصحيح بناء على طلبه","source":"الحوكمة","date":"7\/31\/2025","status":"Active","updateNote":""},{"mainCode":"CR-020","version":1,"type":"CR","category":"التصحيح","title":"إشعار العميل - إنشاء داخلي","text":"في طلبات التصحيح عن طريق الإنشاء الداخلي يجب التحقق من تفعيل خاصية إشعار العميل من قبل منشئ الطلب ويتم توثيق بتمكين إشعارات الرسائل النصية عبر تصوير الشاشة وإرفاقه في نظام ServiceNow.","source":"الحوكمة","date":"4\/22\/1959","status":"Active","updateNote":""},{"mainCode":"CR-021","version":1,"type":"CR","category":"تصحيح","title":"الرقم الموحد - صندوق التنمية","text":"الرقم الموحد لصندوق التنمية الزراعية","source":"الحوكمة","date":"10\/2\/2025","status":"Active","updateNote":""},{"mainCode":"CR-022","version":1,"type":"CR","category":"تصحيح","title":"مستندات تصحيح الاستعمال","text":"بالنسبة للطلبات المتعلقة بتصحيح إستعمال العقار، يتم الاعتماد على أي من المستندات التالية (رخصة البناء، شهادة إتمام البناء، شهادة الأشغال، بيانات الأمانات) وفي حال عدم توفر أي منها يُرفض الطلب.","source":"الحوكمة","date":"10\/9\/2025","status":"Active","updateNote":""},{"mainCode":"CR-023","version":1,"type":"CR","category":"تصحيح","title":"محاضر القصيم - رمز المحضر","text":"فيما يخص محاضر منطقة القصيم التي تتضمن رمز المحضر في القرارات الإبتدائية والنهائية والمحاضر الصادرة من بلدي، يتم التحقق من خلالها عن طريق مسح رمز المحضر.","source":"الحوكمة","date":"10\/21\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-001","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الأطوال - مثال 1","text":"في حال اختلاف الاطوال بين المحضر ورسم الجيومكاني 1مثال \\ 9,48 بالمحضر ورسم الجيومكاني 9,4 يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-001","version":2,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الأطوال - مثال 2","text":"في حال اختلاف الاطوال بين المحضر ورسم الجيومكاني 2مثال \\ 9,48 بالمحضر ورسم الجيومكاني 9.5 يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-001","version":3,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الأطوال - مثال 3","text":"في حال اختلاف الاطوال بين المحضر ورسم الجيومكاني 3مثال \\ 9,48 بالمحضر ورسم الجيومكاني 10 يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"تقريب المساحة","text":"في حال تقريب المساحة في طلبات الفرز والدمج يتم تمرير الطلب مثال المحضر 500.9 الرسم الجيومكاني 501","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":2,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف المساحة ≤ 90سم","text":"في حال نتج اختلاف في المساحة عند تطبيق المحضر والرسم الجيومكاني في الدمج او الفرز وكان الاختلاف 90 سم او اقل يتم تمرير الطلب","source":"الحوكمة","date":"12\/22\/2024","status":"Active","updateNote":"حدث التعميم فيما يتعلق بدمج القطع بناء على تعليمات دمج القطع ص 10"},{"mainCode":"SR-MG-002","version":3,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الاتجاهات","text":"في حال اختلاف الاتجهات بين المحضر ورسم الجيو يتم القبول في حال كان اجمالي الاطوال والمساحة في الجيومكاني مطابق للمحضر","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":4,"type":"SR, MG","category":"الوثائق و المستندات","title":"نموذج توزيع النسب - وكالة","text":"في حال وجود نموذج توزيع لنسب التملك يشترط وجود وكالة تتضمن الاتي: بند توزيع النسب او التنازل والافراغ او التنازل عن المساحة","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":5,"type":"SR, MG","category":"الحقوق, القيود، والالتزامات","title":"الأجزاء الخاصة - فرز الوحدات","text":"في حال تكرر نوع الجزء الخاص ومساحة الجزء الخاص في محضر الفرز لطلبات فرز الوحدات، يتم تمرير الطلب بتسجيل الأجزاء الخاصة دون تكرار","source":"الحوكمة","date":"7\/28\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-003","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"رقم العقار - عدم توفر حدود","text":"في حال عدم توفر حدود للعقار ما قبل الفرز او ما قبل الدمج وتوفر رقم العقار وتم التحقق من صحته يتم تمرير الطلب","source":"الحوكمة","date":"12\/26\/2024","status":"Active","updateNote":""},{"mainCode":"SR-MG-004","version":1,"type":"SR, MG","category":"تفاصيل الصك","title":"وكالة - مشاع","text":"لا يلزم وجود وكالة في حال كان العقار مشاع او لاكثر من مالك ومنشئ عن طريق المنصة ( منصة السجل العقاري )","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-004","version":2,"type":"SR, MG","category":"تفاصيل الصك","title":"اختلاف اسم المالك","text":"في حال كان اسم المالك مختلف عن اسم المالك في المحضر يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-005","version":1,"type":"SR, MG","category":"المراجعة, الوثائق و المستندات","title":"محضر غير معتمد - منصة خارجية","text":"في حال لم يتم اعتماد المحضر - في خانة تاريخ الاعتماد وكان مقدم الطلب منصة خارجية يتم تمرير الطلب","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-006","version":1,"type":"SR, MG","category":"المراجعة, الوثائق و المستندات","title":"المخطط الورقي","text":"يتم التجزئة وفق المخطط الورقي و يتم الأعتماد عليها في حالة وجود المخطط في الأرشفة الخاصة بالبوابة المكانية او في حالة تم ارساله لنا من قبل الـ BO و يتم القبول مع اجتزاء غرفة الكهرباء من العقار في حالة كانت موجودة في المخطط الورقي","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-007","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"ختم طبق الأصل","text":"يتم التحقق من المحاضر بختم طبق الأصل، تتم من خلال مطابقة بيانات العقار في المحضر مع صك تسجيل الملكية.","source":"الحوكمة","date":"4\/22\/1957","status":"Updated","updateNote":"تعليمات فرز و دمج القطع ص 8"},{"mainCode":"SR-MG-008","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"إعادة تجزئة - ملاك مختلفون","text":"في حال طلب إعادة تجزئة ( دمج ثم الفرز ) لملاك مختلفين وكل مالك يملك 100% من كل قطعة ، يتم قبول الطلب بمالك واحد ويتم إضافة الملاك الاخرين عن طريق الانسدنت","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-MG-009","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"محاضر رسمية - بريد الكتروني","text":"يتم الاعتماد على المحاضر الوارده في حال وصولها من بشكل رسمي ( عن طريق البريد الالكتروني ) حتى ولو لم تتضمن ختم او باركود بسبب وصولها بشكل رسمي ولضمان صحتها.","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-MG-010","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"أطوال رسم الكروكي","text":"لا يتم الاعتماد على الاطوال الوارد برسم الكروكي بالمحضر او المستند الرسمي في حال لم تذكر بالجدول ويلزم تعديل المستند","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":"تم تحديث التعميم بتاريخ 2025\/08\/17 تم عكسه في تعليمات العمل"},{"mainCode":"MG-001","version":1,"type":"MG","category":"التفاصيل الجيومكانية","title":"اختلاف حد العقار - الدمج","text":"في حال اختلف حد من حدود العقار قبل الدمج او بعد الدمج يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MG-002","version":1,"type":"MG","category":"التفاصيل الجيومكانية","title":"مساحة ما بعد الدمج","text":"في حال كانت المساحة ما بعد الدمج غير متوفرة يتم تمرير الطلب في حال إمكانية معرفة المساحة من الاطوال","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"MG-002","version":2,"type":"MG","category":"التفاصيل الجيومكانية","title":"اختلاف مجموع مساحات الدمج","text":"في حال وجود اختلاف بمجموع مساحات القطع قبل الدمج ومساحة القطعة بعد الدمج بأقل من واحد متر يتم قبول الطلب سواء كان الفرق زيادة او نقص","source":"الحوكمة","date":"4\/22\/1957","status":"Updated","updateNote":"تعليمات دمج القطع ص 8"},{"mainCode":"SR-001","version":1,"type":"SR","category":"فرز المخططات","title":"تعليمات فرز المخططات","text":"في طلبات فرز المخططات يتم اتباع الآتي: في الصكوك التي ينعكس فيها استخدام العقار بشكل خاطئ، يتم رفع انسدنت ريبورت لتعديل الاستخدام بعد قبول الطلب مباشرة. لا يتم مطابقة مساحات المرافق العامة مالم تكن في ملكية صاحب الحق، ويتم رفع طلب حذف تسجيل الصك بعد قبول الطلب مباشرة. تخصم من مساحات القطع الي تحوي غرف كهرب وفق مساحة غرف الكهرب في المحضر.","source":"الحوكمة","date":"12\/26\/2024","status":"Active","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-002","version":1,"type":"SR","category":"المراجعة, الوثائق و المستندات","title":"محضر غير رسمي - فرز","text":"في حال ظهور ( المحضر غير رسمي ) بمحاضر فرز الوحدات تصنف كنقص وثائق اذ كان الطلب مقدم من المستفيد ، وفي حال كان الطلب مقدم من منصة فرز يتم التواصل مع الـ BO .","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":2,"type":"SR","category":"تفاصيل الصك","title":"نسب الوحدات من الأرض","text":"في حال كان مجموع نسب الوحدات من الأرض بمحاضر الفرز مابين 97% - 103% يتم قبول الطلب","source":"الحوكمة","date":"1\/28\/2026","status":"Active","updateNote":""},{"mainCode":"SR-002","version":3,"type":"SR","category":"الحقوق, القيود، والالتزامات","title":"إزالة حق الانتفاع - فرز مرهون","text":"عمليات فرز الوحدات يتم إزالة حق الانتفاع عن الصك الأساس اولاً عن طريق خدمة التجاوز المالي ، ومن ثم تتم عملية الفرز عن طريق التجاوز المالي","source":"الحوكمة","date":"4\/22\/1957","status":"Active","updateNote":""},{"mainCode":"SR-002","version":4,"type":"SR","category":"تفاصيل الصك","title":"الأجزاء الخاصة - تعليق","text":"(QW- استفسار حوكمة - الاجزاء الخاصة) يتم تعليق طلبات فرز الوحدات المتضمنه للاجزاء الخاصة باسم فواز النجدي","source":"الجودة","date":"5\/14\/2025","status":"Cancelled","updateNote":"الغي التعميم وفقا للتعميم بالصف 55"},{"mainCode":"SR-002","version":5,"type":"SR","category":"تفاصيل الصك","title":"الأجزاء الخاصة - تمرير","text":"فيما يتعلق بطلبات فرز الوحدات المتضمنة للاجزاء الخاصة : يتم تمرير الطلبات كما في السابق ( دون الحاجة لاضافة الاجزاء الخاصة ) الى حين اطلاق التحديث","source":"الحوكمة","date":"5\/14\/2025","status":"Updated","updateNote":"حدث التعميم وفقا للتعميم بالصف 56"},{"mainCode":"SR-002","version":6,"type":"SR","category":"التفاصيل الجيومكانية","title":"إعادة المدقق - الأجزاء الخاصة","text":"في طلبات فرز الوحدات ، في حال وجود اجزاء خاصة ولم تضاف ، يعاد للمدقق للتحقق من اضافة الاجزاء الخاصة.","source":"الجودة","date":"5\/15\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":7,"type":"SR","category":"بيانات الفرز والدمج","title":"فرز - وزارة الاسكان","text":"فيما يتعلق بطلبات فرز الوحدات من خلال وزارة الاسكان : يتم تعليقها لدى الزميلة ساره العبداللطيف","source":"الجودة","date":"5\/18\/2025","status":"Cancelled","updateNote":""},{"mainCode":"SR-002","version":8,"type":"SR","category":"التفاصيل الجيومكانية","title":"رقم السند - فرز الوحدات","text":"فيما يتعلق بطلبات فرز الوحدات المتضمنة للاجزاء الخاصة يتم الاعتماد في رقم السند على اضافة رقم المحضر ورقم الطلب","source":"الحوكمة","date":"5\/18\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":9,"type":"SR","category":"الحقوق, القيود، والالتزامات","title":"فرز عقار مرهون - رهن جزئي","text":"في حال وصول طلب تجزئة او فرز لعقار مرهون متضمن خطاب يفيد بسريان الرهن على بعض العقارات دون الأخرى بعد عملية الفرز او التجزئة يتم قبول الطلب","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-003","version":1,"type":"SR","category":"التفاصيل الجيومكانية","title":"غرفة الكهرباء - تجزئة","text":"في حال كانت غرفة الكهرباء مضمنة بالرسم والعميل يرغب بتجزئة القطعة وبعد التجزئة لاتتضمن كل القطع غرفة كهرباء يتم إزالة الحق أولا عن طريق خدمة التجاوز المالي ، و يتم تجزئة القطع عن طريق التجاوز المالي ، ويتم إضافة الحق عن طريق التجاوز المالي للقطع التي تحتوي غرفة الكهرباء بعد الانتهاء من طلب التجزئة","source":"الحوكمة","date":"4\/22\/1957","status":"Active","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-004","version":1,"type":"SR","category":"التفاصيل الجيومكانية","title":"حق الانتفاع - تجزئة","text":"في حال وجود طلب تجزئة قطع أراضي والعقار الأساس يوجد عليه حق انتفاع ، يتم قبول ومن ثم يتم إزالة حق الانتفاع عن القطع التي لاتحتوي غرفة كهرب بعد التجزئة عن طريق خدمة التجاوز المالي","source":"الحوكمة","date":"4\/22\/1957","status":"Active","updateNote":"تم عكسه في تعليمات العمل."},{"mainCode":"SR-005","version":1,"type":"SR","category":"تفاصيل الصك","title":"ملكية مشتركة - تجزئة","text":"في حال وصول طلب تجزئة لعقار يتضمن اكثر من مالك ويوجد ملاحظة تفيد برغبة الملاك بتملك كل مالك لأحد العقارات بعد عملية التجزئة ( دون وجود نموذج توزيع النسب ) ، يتم افادة خدمة العملاء للتواصل مع العميل وتوجيه للفرع","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":""},{"mainCode":"SR-006","version":1,"type":"SR","category":"فرز","title":"محاضر الشرقية - باركود","text":"فيما يخص اي طلبات محاضر تحتوي على باركود بدون توقيع مثل المحاضر اللي وصلتنا من امانة منطقة الشرقيه فيتم تعليقها هولد حوكمة وعدم إحالتها للجيومكاني","source":"الحوكمة","date":"4\/9\/1959","status":"Updated","updateNote":""},{"mainCode":"SR-007","version":1,"type":"SR","category":"فرز","title":"محاضر الشرقية المعلقة","text":"تعميم فيما يخص طلبات محاضر الشرقية المعلقة مسبقاً بناءً على توجيه الحوكمة فسيتم العمل وفق التعميم بخطوات التحقق من الباركود والتوقيع","source":"الحوكمة","date":"4\/15\/1959","status":"Updated","updateNote":""},{"mainCode":"SR-MG-CR-001","version":1,"type":"SR, MG, CR","category":"المراجعة, الوثائق و المستندات","title":"الاعتماد على الاحداثيات","text":"بالإمكان الاعتماد على الاحداثيات بالمحضر لتحديد موقع القطعة","source":"الحوكمة","date":"1\/12\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-002","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"اجتزاء غرفة الكهرباء - تنازل","text":"يتم اجتزاء غرفة الكهرباء في حال تنازل صاحب العلاقة عن المساحة لصالح شركة الكهرباء.","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-003","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"اجتزاء غرفة الكهرباء - مرفق","text":"يتم اجتزاء غرفة الكهرباء في حال تم ذكر ذلك بالمرفقات بعد التحقق من صحة المرفق","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-004","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"استخدام العقار - المحضر","text":"في حال اختلاف استخدام العقار بين بيانات الأمانة والمحضر يتم الاستناد على استخدام العقار من خلال المحضر","source":"الحوكمة","date":"1\/22\/2025","status":"Updated","updateNote":"تعليمات التصحيح 3.4 ص 8"},{"mainCode":"SR-MG-W-001","version":1,"type":"SR, MG","category":"تفاصيل الصك","title":"وكالة - منصة خارجية فرز\/دمج","text":"في حال كان مقدم الطلب لعملية الفرز او التجزئة او دمج الوحدات او دمج القطع منصة خارجية لا يلزم التحقق من وجود وكالة","source":"الحوكمة","date":"4\/1\/1959","status":"Active","updateNote":"تم عكسه في تعليمات العمل"},{"mainCode":"MR-001","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"حق الإيجار - وثيقة","text":"في حال طلب إضافة حق الايجار هل يستلزم وجود وثيقة عقد الايجار ؟ يتم قبول الطلب في حال وجود موافقة الأطراف","source":"الحوكمة","date":"","status":"Cancelled","updateNote":"تم تحديثه وعكسه في تعليمات العمل"},{"mainCode":"MR-002","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"رهن - نفس المالك","text":"في حال تقديم مالك العقار طلب إضافة حق رهن لنفس المالك يتم رفض الطلب - بتوصية ( عزيزي العميل ، البيانات المدخلة لصاحب الحق غير صحيحية )","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MR-002","version":2,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"نقل حق الانتفاع - تصحيح","text":"في حال قدم العميل طلب فك او تعديل القيد وذلك بسبب ان حق الانتفاع لم ينتقل بعد عملية نقل الملكية فيتم إنشاء طلب بخدمة تجاوز المقابل المالي لنقل الحق من المالك السابق للمالك الحالي ورفع تذكر استرداد المقابل المالي ، والغاء الطلب الحالي","source":"الحوكمة","date":"8\/27\/2025","status":"Updated","updateNote":""},{"mainCode":"MR-003","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"مرفق ينافي الخدمة","text":"في حال وجود طلب ( اداراة حقوق وقيود والتزامات ) المرفق ينافي الخدمة المختارة بالمنصة ، يتم الرجوع للـ bo للتحقق من المراد من الخدمة في حال كان مقدم الطلب منصة خارجية","source":"الحوكمة","date":"22\/12\/2025","status":"Active","updateNote":""},{"mainCode":"MR-004","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"رهن إضافي - نفس الجهة","text":"في حال رغبة العميل إضافة حق رهن اخر لنفس الجهة الراهنه الأولى ، يتم إضافة الحق بشكل مستقل","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MR-005","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"موافقة أطراف - شركة","text":"يكتفى بموافقة جميع الأطراف بحال وصول طلب إضافة او إزالة رهن وأحد الأطراف شركة حتى ولو لم يتضمن الطلب أي مستند","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MR-006","version":1,"type":"MR","category":"فرز","title":"رهن منتهي التاريخ","text":"في حال تقديم العميل طلبًا لإضافة رهن وكان تاريخ نهاية الرهن منتهي، وتم التحقق من العميل يتم إزالة تاريخ الانتهاء من الطلب وتمريره.","source":"الحوكمة","date":"4\/16\/1959","status":"Active","updateNote":""},{"mainCode":"DT-001","version":1,"type":"DT","category":"نقل ملكية","title":"هبة - قيود موهوبين","text":"في حال عملية نقل الملكية بهبة المتضمنة قيود على الموهوبين دون ذكر تفاصيل القيد بشكل مفصل يتم قبول الطلب في حال وجود الموافقات بشرط عدم تكرار القيد","source":"الحوكمة","date":"","status":"Active","updateNote":"تم عكسه في تعليمات العمل"},{"mainCode":"DT-002","version":1,"type":"DT","category":"نقل ملكية","title":"هبة - قيود واهب","text":"في حال تضمن الهبة قيود على الواهب دون ذكر تفاصيل يتم قبول الطلب في حال وجود الموافقات بشرط ذكر قيد واحد فقط لا اكثر","source":"الحوكمة","date":"","status":"Updated","updateNote":"تم تحديثه وعكسه في تعليمات العمل"},{"mainCode":"DT-MR-001","version":1,"type":"DT-MR","category":"نقل ملكية ، الحقوق، القيود، و الإلتزامات","title":"حالة العقار - إيقاف","text":"يكتفى بحالة المنطقة في المنصة للتحقق من حالة العقار وفي حال وجود إيقاف يتم الرجوع للمناطق العقارية والتحقق من حالة العقار وذلك في طلبات نقل الملكية","source":"الحوكمة","date":"","status":"Active","updateNote":"تم عكسه في تعليمات العمل"},{"mainCode":"MR-DT-001","version":1,"type":"DT-MR","category":"الحقوق، القيود، و الإلتزامات  نقل الملكية","title":"التحقق من الوكالات","text":"آلية التحقق من الوكالات للأفراد والمؤسسات والشركات بشكل تفصيلي وفق عدد المدراء والصلاحيات","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"GEN-001","version":1,"type":"","category":"تصحيح","title":"إشكالية المقابل المالي","text":"طلبات التصرفات التي تنشأ بدفع مقابل من العميل ويوجد إشكالية في الطلبات: يتم إفادة تشغيل العمليات للتواصل مع المستفيد لاسترداد المقابل المالي.","source":"الحوكمة","date":"10\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":1,"type":"","category":"","title":"محاضر القصيم - رمز المحضر","text":"فيما يخص محاضر منطقة القصيم التي تتضمن رمز المحضر: يتم التحقق عن طريق مسح رمز المحضر، ولا يوجد حاجة للتحقق من المسارات التشغيلية.","source":"الحوكمة","date":"10\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":2,"type":"","category":"","title":"استعمال العقار - المحاضر","text":"فيما يخص إستعمال العقار، يمكن الإستناد على المحاضر من ضمن المستندات التي يمكن فيها تغيير الإستعمال.","source":"الحوكمة","date":"4\/12\/1959","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":3,"type":"","category":"","title":"حقوق الانتفاع - موافقة أطراف","text":"فيما يخص طلبات إضافة حقوق الإنتفاع التي لا تتضمّن مرفقات داعمة، يمكن تمرير طلبات حقوق الإنتفاع بموافقة الأطراف.","source":"الحوكمة","date":"4\/12\/1959","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":4,"type":"","category":"","title":"فك الرهن - موافقة أطراف","text":"فيما يخص طلبات فك الرهن فـ يتم معالجة الطلب استنادًا على موافقة أطراف العلاقة وفك الرهن ولا يلزم التحقق من الوثائق المرفقة.","source":"الحوكمة","date":"4\/26\/1960","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":5,"type":"","category":"","title":"إلغاء التصحيح بعد الانسدنت","text":"فيما يخص طلبات التصحيح التي يتم تنفيذها من خلال تقرير الحادثة، يتم إلغاء طلب التصحيح كون التصحيح تم من خلال تقرير الحادثة.","source":"الحوكمة","date":"9\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":6,"type":"","category":"","title":"الأجزاء الخاصة - إضافة بانسدنت","text":"فيما يخص طلبات التصحيح لـ إضافة الأجزاء الخاصة: يتم التحقق من المحضر السابق ثم تعليق الطلب لاستيفاء المقابل المالي (300 ريال) ثم تعديل البيانات عن طريق الانسدنت ريبورت.","source":"الحوكمة","date":"14\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-003","version":1,"type":"","category":"","title":"أولوية المستندات - الجيومكاني","text":"في ما يخص طلبات التصحيح التي تُحال للجيومكاني لتعديل رقم القطعة أو رقم المخطط أو البلوك، في حال العميل أرفق اكثر من مستند فيتم التصحيح وفقًا لأولوية المستندات.","source":"الحوكمة","date":"10\/22\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-003","version":2,"type":"","category":"","title":"رفض تصحيح اسم الحي","text":"فيما يخص طلبات تصحيح اسم الحي، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"11\/18\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-003","version":3,"type":"","category":"","title":"توصية الجيو - رفض الاستعمال","text":"بالنسبة لطلبات تغيير الاستعمال التي يتم إحالتها للجيومكاني ويتم رفض تغيير الاستعمال بتوصية إرفاق خطاب من الأمانة فيتم الاستناد على توصية الجيو ورفض الطلب.","source":"الحوكمة","date":"2\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-003","version":4,"type":"","category":"","title":"ترتيب التقسيم - رقم القطعة","text":"في حال يوجد اختلاف في ترتيب التقسيم في رقم القطعة بين المحضر وتطبيق الجيو فيتم تمرير الطلب دون الحاجة لإعادة الطلب للجيومكاني.","source":"الحوكمة","date":"18\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":1,"type":"","category":"","title":"تعدد الرهن - تجزئة","text":"في حال تعدد الرهن بعد تجزئة العقار\/ فرز العقار\/إعادة التجزئة وانتقل الرهن إلى العقارات الأخرى، ففي حال رغبة المستفيد بإزالة الرهن يتم من خلال تقديم طلب من قبل المستفيد بمقابل مالي.","source":"الحوكمة","date":"11\/10\/2025","status":"Updated","updateNote":""},{"mainCode":"GEN-004","version":2,"type":"","category":"","title":"نزع الملكية - آلية الفرز","text":"بشأن نزع الملكية لصالح عقارات الدولة، يتم تنفيذ الآلية بالموائمة مع الزملاء في تشغيل العمليات وفق خطوات الفرز ثم النقل.","source":"الحوكمة","date":"23\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":3,"type":"","category":"","title":"الفرز - إزالة حق انتفاع أو رهن","text":"في طلبات الفرز أو التجزئة أو الدمج التي تتطلب إزالة حق انتفاع او إزالة رهن مكرر؛ يتم إزالتها عن طريق خدمة تجاوز المقابل المالي.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":4,"type":"","category":"","title":"تحديات الوكالات - فرز ودمج","text":"تحدي الوكالات في خدمتي الفرز والدمج ونقل الملكية وإدارة الحقوق: التوجيهات التفصيلية لكل تحدي.","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":5,"type":"","category":"","title":"مرفق ينافي خدمة الفرز","text":"في حال وجود طلب ( فرز\/ تجزئة\/دمج\/إعادة فرز ) المرفق ينافي الخدمة المختارة بالمنصة، يتم التواصل مع العميل للتحقق من الخدمة.","source":"الحوكمة","date":"2\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":6,"type":"","category":"","title":"فرز مخطط - عقارات غير مدموجة","text":"في حال يوجد طلب فرز لمخطط لعقارات غير مدموجة فيتم العمل بآلية: تقديم طلب فرز مخطط لاستيفاء المقابل المالي ثم إلغاء الطلب وإنشاء دمج ثم فرز بتجاوز المقابل المالي.","source":"الحوكمة","date":"23\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":7,"type":"","category":"","title":"رفض طلب تصحيح للفرز\/دمج","text":"في حال تقدم العميل بطلب تصحيح لفرز\/دمج العقارات يتم رفض الطلب بصيغة محددة.","source":"الحوكمة","date":"12\/3\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":8,"type":"","category":"","title":"دمج المحضر - تجزئة وفرز","text":"في حال تقديم العميل طلب فرز ويتضح في المحضر الدمج لغرض التجزئة، تتم عملية الدمج بتجاوز المقابل المالي والتجزئة بمقابل مالي.","source":"الحوكمة","date":"16\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":9,"type":"","category":"","title":"تعذر الفرز - زائدة تنظيمية","text":"في حال تعذّر فرز المخطط لوجود زائدة تنظيمية غير مسجلة، يتم اتباع خطوات: إلغاء طلب الفرز ثم رسم الزائدة وتسجيلها ثم الدمج ثم التجزئة.","source":"الحوكمة","date":"16\/3\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":10,"type":"","category":"","title":"تعدد الرهون - توضيح","text":"توضيح حالات تعدد الرهون: في حال تعدد الرهن بعد تجزئة العقار أو فرزه أو إعادة تجزئته، وانتقال الرهن إلى العقارات الأخرى، فإنه في حال رغبة المستفيد بإزالة الرهن عن أحد العقارات، يتم ذلك بتقديم طلب بمقابل مالي.","source":"الحوكمة","date":"4\/13\/1961","status":"Active","updateNote":""},{"mainCode":"GEN-005","version":1,"type":"","category":"","title":"التحقق من الوكالات - MG\/SR","text":"يلزم التحقق من الوكالات وعدم الاعتماد على قراءة المنصة في طلبات (MG-SR) و(DT-MR) وفق الإجراء المعتمد.","source":"الحوكمة","date":"11\/4\/2025","status":"Updated","updateNote":""},{"mainCode":"GEN-005","version":2,"type":"","category":"","title":"التحقق من الوكالات - جميع الخدمات","text":"يلزم التحقق من الوكالات وعدم الاعتماد على قراءة المنصة في جميع الخدمات المتعلقة بالتصرفات العقارية مع إجراء تفصيلي للرفض.","source":"الحوكمة","date":"4\/11\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":1,"type":"","category":"","title":"التحقق من حالة المالك","text":"فيما يخص طلبات نقل الملكية يتم التحقق من حالة المالك عن طريق منصة معالجة الطلبات والنظر في حالة المالك والتحقق من أنه غير مقيد.","source":"الحوكمة","date":"11\/11\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":2,"type":"","category":"","title":"المؤسسات - بدون وكيل","text":"طلبات التصرفات المتعلقة بالمؤسسات، والتي يظهر بها بيانات المالك بأسم المؤسسة ولا يظهر بها بيانات وكيل. يتم تمريرها بشكل مباشر ولا يلزم وجود وكالة.","source":"الحوكمة","date":"17\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":3,"type":"","category":"","title":"فك الرهن - لا تحقق من المالك","text":"فيما يتعلق بطلبات إدارة الحقوق والقيود خدمة فك الرهن ، لا يتم التحقق من المالك وصفة مقدم الطلب، يكتفى بموافقة صاحب الحق.","source":"الحوكمة","date":"15\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":4,"type":"","category":"","title":"واهب يمثل الموهوب له","text":"فيما يخص طلبات نقل الملكية التي يكون أحد الواهبين يمثل الموهوب له، يتم قبول الطلب حيث أن الأصيل بنفسه أجاز التصرف.","source":"الحوكمة","date":"28\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":5,"type":"","category":"","title":"مكتب ... - التحقق","text":"فيما يخص الطلبات التي يظهر اسم المالك (مكتب .......) ولا يوجد وكيل يتم التحقق عن طريق الرابط أو السجل التجاري.","source":"الحوكمة","date":"29\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":6,"type":"","category":"","title":"وقف - التمرير","text":"في حال وردنا طلب ويتضح أن المالك ( وقف لـ ..... ) وبعد التحقق من عدم وجود قيد وقف يتم تمرير الطلب.","source":"الحوكمة","date":"18\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":7,"type":"","category":"","title":"نقص بنود الوكالة - تعليق","text":"فيما يخص نقص بنود الوكالات في طلبات نقل الملكية كرماً عدم رفض الطلبات بشكل مباشر، ويتم تعليقها نقص الوثائق مع التوضيح في أسباب تعليق الطلب.","source":"الحوكمة","date":"27\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":8,"type":"","category":"","title":"حق الانتفاع - أجزاء خاصة","text":"في حال قدم العميل طلب فك او تعديل القيد بسبب ان حق الانتفاع لم ينتقل للمالك الحالي بعد عملية نقل الملكية فيتم التعامل مع الحالات وفق وجود أو عدم وجود الأجزاء الخاصة.","source":"الحوكمة","date":"16\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-007","version":1,"type":"","category":"","title":"رخص البناء - تاريخ الانتهاء","text":"يمكن الاستناد على رخص البناء بغض النظر عن تاريخ الانتهاء بشرط التوافق مع المصورات الجوية.","source":"الحوكمة","date":"11\/11\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":1,"type":"","category":"","title":"القرارات المساحية - أخطاء مادية","text":"تقبل القرارات المساحية لتعديل الأطوال أو المساحة في حال تطابق الأطوال أو المساحة مع صك العدل، وذلك في حال وجود أخطاء مادية أو كتابية.","source":"الحوكمة","date":"11\/11\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":2,"type":"","category":"","title":"مساحة المخططات - الأرض المتوازية","text":"في طلبات المخططات التي لا يُذكر فيها مساحة الأراضي في المخطط المعتمد؛ إذا كانت الأرض متوازية يتم الاكتفاء بضرب الطول في العرض لاستخراج المساحة.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":3,"type":"","category":"","title":"استثناء القصيم - المساحة","text":"إشارة إلى توجيه الهيئة العامة للعقار باستثناء طلبات التعديل على أراضي منطقة القصيم من حيث المساحة والأطوال والبيانات الجيومكانية.","source":"الحوكمة","date":"29\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":4,"type":"","category":"","title":"الأطوال التقريبية - الجيومكاني","text":"في حال تم تعديل الأطوال من قبل الجيومكاني ولكن تظهر بشكل تقريبي يتم تمرير الطلب.","source":"الحوكمة","date":"18\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":5,"type":"","category":"","title":"تصحيح تنازل المساحة - دراسة","text":"في حال ورد طلب تصحيح المساحة بسبب تنازل المالك عن جزء من مساحته لا يتم رفض الطلب مباشرة، يتم دراسة الطلبات والمرفقات الداعمة وفق معايير محددة.","source":"الحوكمة","date":"9\/2\/2026","status":"Updated","updateNote":""},{"mainCode":"GEN-008","version":6,"type":"","category":"","title":"آلية تعليق طلبات النزع الجزئي","text":"آلية تعليق طلبات تصحيح النزع الجزئي التي تم الإنتهاء من تصحيح المساحة ويتطلب تسجيل العقار المنزوع تسجيل أولي بخطوات محددة.","source":"الحوكمة","date":"26\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-009","version":1,"type":"","category":"","title":"طلبات وحدات - لتصحيح الأساس","text":"الطلبات المقدمة للوحدات لغرض تصحيح العقار الأساس؛ يتم رفضه ولا يتم تعليق الطلب.","source":"الحوكمة","date":"11\/18\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-009","version":2,"type":"","category":"","title":"حق إيجار - عقد تمويل إجارة","text":"فيما يخص الطلبات المقدمة من العملاء بإختيار خدمة إضافة حق إيجار والمرفق عقد تمويل بصيغة الإجارة فالإجراء إلغاء الطلب وإضافة حق إنتفاع للمستفيد.","source":"الحوكمة","date":"11\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-009","version":3,"type":"","category":"","title":"تجزئة قبل نزع جزء من العقار","text":"آلية التعامل مع طلبات التجزئة المقدمة قبل إجراء نزع جزء من العقار مع خطوات تفصيلية للرفض أو الإلغاء وآلية التنفيذ.","source":"الحوكمة","date":"25\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-010","version":1,"type":"","category":"","title":"تغيير استعمال - نوع العقار في رخصة","text":"يتم تغيير استعمال العقار بناء على نوع العقار في رخصة البناء وشهادة البناء حتى لو لم يتم ذكر كلمة الاستعمال في الشهادة أو الرخصة.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-011","version":1,"type":"","category":"","title":"طلب باسم الشركة - بدون وكيل","text":"في حال تقديم طلب باسم الشركة دون توضيح اسم الوكيل في الطلب، يُعلق الطلب مشكلة تقنية مع تفاصيل آلية العمل المؤقتة.","source":"الحوكمة","date":"4\/12\/1959","status":"Updated","updateNote":""},{"mainCode":"GEN-012","version":1,"type":"","category":"","title":"حق الإيجار - أقل من 10 سنوات","text":"فيما يتعلق بـ طلبات إضافة حق الإيجار لأقل من 10 سنوات: يتم قبول الطلبات.","source":"الحوكمة","date":"11\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":1,"type":"","category":"","title":"محضر لجنة فنية - دمج وإعادة تقسيم","text":"فيما يخص طلبات الدمج المتضمّنة محضر لجنة فنية يفيد بدمج الأراضي وإعادة تقسيمها، فيتم التقيّد بالتوصية من قبل مدقق الطلبات قبل الإحالة للجيومكاني.","source":"الحوكمة","date":"21\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":2,"type":"","category":"","title":"طلبات معادة من الجيومكاني - دمج","text":"يخص الطلبات المُعادة من الجيومكاني بتوصية تمت التجزئة\/ الدمج مع وجود أي ملاحظات على المحضر، فيتم تمرير الطلب بعد التحقق من إتمام عمليتي التجزئة أو الدمج.","source":"الحوكمة","date":"21\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":3,"type":"","category":"","title":"دمج - ملاك مختلفون","text":"في حال ورود طلبات دمج عقارات تعود لملاك مختلفين، لا يتم قبول طلب الدمج إلا بعد التواصل مع العميل لزيارة الفرع والتوقيع على نموذج توزيع النسب.","source":"الحوكمة","date":"29\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":4,"type":"","category":"","title":"دمج وحدات - أجزاء خاصة","text":"في حال ورود طلبات دمج وحدات تتضمن أجزاء خاصة ولا يمكن إضافتها لقصور بالمنصة يتم قبول طلب الدمج ثم إضافة الأجزاء الخاصة عن طريق الانسدنت ريبورت.","source":"الحوكمة","date":"29\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":5,"type":"","category":"","title":"تصحيح موقع قبل التجزئة\/الدمج","text":"لطلبات التجزئة والدمج وتبيّن بوجوب تصحيح موقع العقار لوجود خطأ بالتسجيل، يتم رفض الطلب ثم إنشاء طلب تصحيح وإجراء تصحيح لموقع العقار.","source":"الحوكمة","date":"25\/02\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-014","version":1,"type":"","category":"","title":"تعليق الطلب - نقص وثائق\/رد جهة","text":"تعليق الطلب نقص وثائق: في حال وجود نقص في المستندات أو في حال كان المرفق لا يتوافق مع متطلبات الخدمة. تعليق الطلب رد جهة خارجية: في حال كان استكمال الطلب يتطلب التواصل مع جهات خارجية.","source":"الحوكمة","date":"22\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-015","version":1,"type":"","category":"","title":"بند التأشير - حق الإيجار","text":"يُكتفى بوجود بند التأشير في مايتعلق بالبنود المتطلب توفّرها في الوكالة لـخدمة إضافة حق الإيجار.","source":"الحوكمة","date":"28\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-016","version":1,"type":"","category":"","title":"رقم العقار - نموذج الموافقة","text":"فيما يخص طلبات تصحيح موقع العقار، وإختلف رقم العقار بعد التصحيح بين نموذج الدراسة ونموذج الموافقة النهائي، فيتم الإعتماد على رقم العقار الوارد بنموذج الموافقة.","source":"الحوكمة","date":"6\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-016","version":2,"type":"","category":"","title":"الوكالة - صك العدل","text":"فيما يخص الوكالات والتي يتم الإشارة بها لرقم صك العدل المرتبط برقم العقار المسجل عينيًا، يمكن الإستناد على الوكالات المرتبطة بصك العدل فقط.","source":"الحوكمة","date":"18\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-017","version":1,"type":"","category":"","title":"توثيق التحقق من يقين - هوية","text":"يلزم توثيق عملية التحقق من يقين في طلبات التصحيح التي فيها تعديل اسم أو رقم أو نوع الهوية وإرفاقها في منصة المعالجة أو نظام السيرفس ناو.","source":"الحوكمة","date":"2026\/14\/01","status":"Active","updateNote":""},{"mainCode":"GEN-017","version":2,"type":"","category":"","title":"تصحيح هوية - تسجيل أولي صحيح","text":"فيما يخص طلبات التصحيح لـ تعديل نوع \/ رقم الهوية لبيانات مسجّلة تسجيل أولي صحيح: يتم تعليق الطلب كـ نقص وثائق لإستيفاء المقابل المالي (300 ريال).","source":"الحوكمة","date":"26\/02\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-017","version":3,"type":"","category":"","title":"هوية الأوقاف - بدون مقابل","text":"تُقبل طلبات تصحيح بيانات (نوع - رقم الهوية) لعقارات الأوقاف من (أخرى - 888) دون مقابل مالي.","source":"الحوكمة","date":"5\/12\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-018","version":1,"type":"","category":"","title":"صك متعدد القطع - تعليق ثم رفض","text":"فيما يخص طلبات التصحيح المقدمة من العملاء للصكوك متعددة القطع والتي يطلب فيها تسجيل بقية القطع: يتم تعليق الطلبات ثم مراجعتها ثم رفضها.","source":"الحوكمة","date":"19\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-018","version":2,"type":"","category":"","title":"تجزئة صك متعدد - تقارير مساحية","text":"لتجزئة صك متعدد القطع، يجب ارفاق جميع التقارير المساحية للقطع. لا يمكن تجزئة قطع دون أخرى.","source":"الحوكمة","date":"18\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-018","version":3,"type":"","category":"","title":"قبول تصحيح بعد الانسدنت","text":"في طلبات التصحيح التي يتم إحالتها للانسدنت ريبورت ثم عودتها للمعالجة: يتم قبول طلب التصحيح في حال تم التحقق من تنفيذ الانسدنت وعكسه على الصك والصحيفة.","source":"الحوكمة","date":"15\/3\/2026","status":"Updated","updateNote":""},{"mainCode":"GEN-019","version":1,"type":"","category":"","title":"رهن لم يحل - رفض","text":"في حال تقديم طلب باسم الشركة دون توضيح اسم الوكيل في الطلب، يُعلق الطلب مشكلة تقنية مع تفاصيل آلية العمل المؤقتة.","source":"الحوكمة","date":"29\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-019","version":2,"type":"","category":"","title":"تصحيح عرض الشارع - تعليق أو رفض","text":"في طلبات تصحيح عرض الشارع: في حال تطابق عرض الشارع مع المخططات المعتمدة وأحد المصادر الأخرى يتم تعليق الطلب. في حال الاختلاف يتم الرفض.","source":"الحوكمة","date":"5\/6\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-020","version":1,"type":"","category":"","title":"تعديل حق الانتفاع لأجزاء خاصة","text":"طلبات التصحيح الذي يطلب العميل تعديل حق الإنتفاع إلى أجزاء خاصة يتم إضافة الطلب بشكل مباشر مع العينات لإضافة الأجزاء الخاصة.","source":"الحوكمة","date":"2\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-021","version":1,"type":"","category":"","title":"صيغة رفض عرض الشارع","text":"توصية الرفض في طلبات تصحيح عرض الشارع: عزيزي المستفيد، رفض، البيانات المسجلة مسبقًا مطابقة لبيانات الجهات ذات الاختصاص.","source":"الحوكمة","date":"2\/2\/2026","status":"Updated","updateNote":""},{"mainCode":"GEN-022","version":1,"type":"","category":"","title":"التعميم يلغي ما قبله","text":"التعميم المرفق يلغي ما قبله ويسري التعميم على جميع المناطق المعلنة مع مراعاة تطبيق القرار المساحي ونموذج إقرار التنازل.","source":"الحوكمة","date":"12\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-023","version":1,"type":"","category":"","title":"قبول فرز مخطط - مساحات غير متوفرة","text":"في حال يوجد طلب فرز لمخطط وتبيّن عدم توفر مساحات أو أطوال لبعض القطع في المخطط يتم القبول استناداً على مدخلات القطاع الجيومكاني.","source":"الحوكمة","date":"24\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-024","version":1,"type":"","category":"","title":"خطابات أمانة جدة - تصحيح الاستعمال","text":"نظرًا لوجود لبس في الخطابات الواردة من أمانة جدة المتعلقة بتصحيح استعمال الأرض: يتم التمييز بين الخطاب المختوم والخطاب بملصق رسمي فقط ونظام البناء.","source":"الحوكمة","date":"4\/15\/1961 </script>
<script>

loadFilters()

function loadFilters(){

    let titleDropdown = document.getElementById("titleFilter")

    let typeDropdown = document.getElementById("typeFilter")

    let titles = [...new Set(allData.map(x => x.title))]

    let types = [...new Set(allData.map(x => x.type))]

    titles.forEach(title=>{

        titleDropdown.innerHTML += `
<option value="${title}">

                ${title}
</option>

        `

    })

    types.forEach(type=>{

        typeDropdown.innerHTML += `
<option value="${type}">

                ${type}
</option>

        `

    })

    searchCirculars()

}

function searchCirculars(){

    let title = document.getElementById("titleFilter").value

    let type = document.getElementById("typeFilter").value

    let keyword = document.getElementById("keywordFilter").value.toLowerCase()

    let date = document.getElementById("dateFilter").value

    let filtered = allData.filter(item=>{

        let titleMatch =

            title === "" || item.title === title

        let typeMatch =

            type === "" || item.type === type

        let keywordMatch =

            keyword === "" ||

            item.title.toLowerCase().includes(keyword) ||

            item.text.toLowerCase().includes(keyword) ||

            item.mainCode.toLowerCase().includes(keyword)

        let dateMatch =

            date === "" || item.date.includes(date)

        return titleMatch && typeMatch && dateMatch && keywordMatch

    })

    let grouped = {}

    filtered.forEach(item=>{

        if(!grouped[item.mainCode]){

            grouped[item.mainCode] = []

        }

        grouped[item.mainCode].push(item)

    })

    Object.keys(grouped).forEach(code=>{

        grouped[code].sort((a,b)=> b.version - a.version)

    })

    renderResults(grouped)

}

function getArabicStatus(status){

    if(!status) return ""

    status = String(status)

    if(

        status.includes("ساري") ||

        status.toLowerCase().includes("active")

    ){

        return "ساري"

    }

    if(

        status.includes("حدث") ||

        status.includes("محدث") ||

        status.includes("مصاف") ||

        status.toLowerCase().includes("updated")

    ){

        return "محدث"

    }

    if(

        status.includes("ملغي") ||

        status.toLowerCase().includes("cancel")

    ){

        return "ملغي"

    }

    return status

}


function getStatusClass(status){

    if(!status) return ""

    status = String(status)

    if(

        status.includes("ساري") ||

        status.toLowerCase().includes("active")

    ){

        return "active-status"

    }

    if(

        status.includes("حدث") ||

        status.includes("محدث") ||

        status.includes("مصاف") ||

        status.toLowerCase().includes("updated")

    ){

        return "updated-status"

    }

    if(

        status.includes("ملغي") ||

        status.toLowerCase().includes("cancel")

    ){

        return "cancelled-status"

    }

    return ""

}

function renderResults(grouped){

    let resultBox = document.getElementById("results")

    let html = ""

    let codes = Object.keys(grouped)
    codes.reverse()

    if(codes.length === 0){

        resultBox.innerHTML = `
<div class="no-results">

                لا توجد نتائج
</div>

        `

        return

    }

    codes.forEach(code=>{

        let versions = grouped[code]

        let current = versions[0]

        let oldVersions = versions.slice(1)

        html += `
<div class="card">
<div class="status-badge ${getStatusClass(current.status)}">

                ${getArabicStatus(current.status)}
</div>
<div class="card-title">

                ${current.title}
</div>
<div class="version-box">

                ${current.mainCode} - V${current.version}
</div>
<div class="info-grid">
<div class="info-box">
<strong>نوع التعميم:</strong><br>

                    ${current.type}
</div>
<div class="info-box">
<strong>جهة التعميم:</strong><br>

                    ${current.source}
</div>
<div class="info-box">
<strong>التاريخ:</strong><br>

                    ${current.date}
</div>
</div>
<div class="text-box">
<strong>نص التعميم الحالي:</strong>
<p>${current.text}</p>
</div>

        `

        if(oldVersions.length > 0){

            html += `
<details class="history-box">
<summary>عرض الإصدارات السابقة</summary>

            `

            oldVersions.forEach(old=>{

                html += `
<div class="old-version">
<p>
<strong>الإصدار:</strong>

                        V${old.version}
</p>
<p>
<strong>الحالة:</strong>

                        ${getArabicStatus(old.status)}
</p>
<p>
<strong>التاريخ:</strong>

                        ${old.date}
</p>
<div class="text-box">
<p>${old.text}</p>
</div>
</div>

                `

            })

            html += `</details>`

        }

        html += `</div>`

    })

    resultBox.innerHTML = html

}
</script>
</body>
</html>
