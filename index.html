لفرز او التجزئة او دمج الوحدات او دمج القطع منصة خارجية لا يلزم التحقق من وجود وكالة","source":"الحوكمة","date":"9\/1\/2025","status":"Active","updateNote":"تعليمات العمل \"التجزئة\""},{"mainCode":"CR-006","version":7,"type":"CR","category":"تصحيح","title":"تصحيح الملكية","text":"بالتحقق من الوكالات، فإن المنصة تعتمد على قراءة بيانات الوكالة إلكترونيًا، ويتم تمرير الطلبات بناءً على ذلك لجميع العمليات اللاحقة - بدون الحاجة للرجوع لأي من عقود التأسيس وغيره من المستندات - بإستثناء طلبات نقل الملكية، حيث يجب التحقق من الوكالة يدويًا كإجراء إضافي حرصًا وتأكيدًا على صحة البيانات. ","source":"الحوكمة","date":"10\/9\/2025","status":"Updated","updateNote":""},{"mainCode":"GEN-005","version":1,"type":"","category":"","title":"التحقق من الوكالات - MG\/SR","text":"يلزم التحقق من الوكالات وعدم الاعتماد على قراءة المنصة، وفي حال عدم وجود بند يخول بالتصرف في طلبات:  (MG-SR) ؛ يتم تصنيف الطلب نقص وثائق وطلب وكالة صحيحة. (DT-MR) ؛ يتم العمل وفق الإجراء المعتمد بحصر الطلبات.","source":"الحوكمة","date":"11\/4\/2025","status":"Updated","updateNote":""},{"mainCode":"GEN-006","version":2,"type":"","category":"","title":"المؤسسات - بدون وكيل","text":"طلبات التصرفات المتعلقة بالمؤسسات، والتي يظهر بها بيانات المالك بأسم المؤسسة ولا يظهر بها بيانات وكيل. يتم تمريرها بشكل مباشر ولا يلزم وجود وكالة.","source":"الحوكمة","date":"12\/17\/2025","status":"Updated","updateNote":"مرتبط بتحدي الوكالات"},{"mainCode":"GEN-004","version":4,"type":"SR,MG,MR","category":"الوثائق و المستندات","title":"تحديات الوكالات - فرز ودمج","text":"تحدي الوكالات:  (SR-MG) خدمتي الفرز والدمج  التحدي 1\/ وجود وكالة ولكن يوجد نقص في بنود الوكالة أو انتهاء صلاحية الوكالة. التوجيه\/ يتم إحالة ارقام الطلبات لقادة  الفرق لـإتباع الإجراء المعمم في حالتها؛ يتم رفض الطلبات وإبلاغ المستفيدين بتقديم طلبات جديدة على أن تكون التوصية في الرفض؛ \"عزيزي المستفيد، لم يتم إرفاق وكالة متضمنة بند ......... الرجاء تقديم طلب جديد وإرفاق وكالة تتضمن البند المطلوب.\" مع تحديد البندالمطلوب.   (SR-MG-DT) التحدي2\/ خدمة الفرز والدمج ونقل الملكية   عند معالجة الطلبات وأتضح أن المالك شركة ولا يوجد وكالة يتم إحالة الطلبات لـ (قائد الفريق-نائب-مسؤل الشفت) لإستخراج بيانات الوكالة و بيانات مقدم الطلب -	يتم استخراج الوكالة عن طريق ناجز والتحقق بشكل يدوي من بيانات الوكالة - (1-تفاصيل الأطراف \"المالك + مقدم الطلب\" \/2-وجود البند الذي يسمح بتقديم الخدمة \/3-تاريخ الوكالة \"قبل تقديم الطلب\" وسريان الوكالة)  -	إرفاق الوكالة في السيرفس ناو. -	تمرير الطلب مع كتابة المدقق التوصية التالية في المنصة؛ قبول الطلب (بموجب الوكالة رقم: .......... و هوية رقم: ............)  \"يعاد الطلب إذا لم يتم كتابة التوصية\" في حال لم يتم تضمين رقم الوكالة وتم إضافة اسم مقدم الطلب؛ يتم الرجوع لعقد التأسيس والتحقق من صفة مقدم الطلب ووجود الصلاحيات التي تسمح بتقديم الطلب وتمريره بناءً على عقد التأسيس  التحدي 3\/  (MG-SR)  لعدم ظهور وكالات وموافقة أصحاب الحقوق في طلبات التجزئة والدمج المرهونة التوجيه بعد التحديث\/ لا يتطلب التحقق من موافقات أو وكالات لأصحاب الحقوق؛ يتم تمريرها. خدمة (MR) إدارة الحقوق والقيود والالتزامات التحدي1\/ وجود وكالة ولكن يوجد نقص في بنود الوكالة أو انتهاء صلاحية الوكالة. التوجيه بعد التحديث\/ لا يتطلب التحقق من موافقات أو وكالات أصحاب الحقوق؛ يتم تمريرها؛ فقط يتم التحقق من موافقة الملاك \"ماعدا فك الرهن تم التوضيح أدناه\". التحدي2\/ عدم ظهور بيانات الوكيل في الطلبات المقدمة من شركة \" ويُستثنى من ذلك الشركات الواردة ضمن \"مجمع عمل الأعمال\". التوجيه بعد التحديث\/ لا يتطلب التحقق من موافقات أو وكالات أصحاب الحقوق؛ يتم تمريرها؛ فقط يتم التحقق من موافقةووكالة الملاك \"ماعدا فك الرهن تم التوضيح أدناه  التحدي 4\/ عدم ظهور بيانات الملاك في خدمة \"فك الرهن\" وعليه لا يمكن التحقق من وجود الوكالة. التوجيه\/لا يتم التحقق من المالك وصفة مقدم الطلب، يكتفى بوجود صاحب الحق.","source":"الحوكمة","date":"1\/15\/2026","status":"Active","updateNote":"مرتبط بتحدي الوكالات"},{"mainCode":"GEN-016","version":2,"type":"ALL","category":"الوثائق و المستندات","title":"الوكالة - صك العدل","text":"فيما يخص الوكالات والتي يتم الإشارة بها لرقم صك العدل المرتبط برقم العقار المسجل عينيًا، يمكن الإستناد على الوكالات المرتبطة بصك العدل فقط.","source":"الحوكمة","date":"1\/18\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":7,"type":"TR","category":"نقل الملكية","title":"نقص بنود الوكالة - تعليق","text":"فيما يخص نقص بنود الوكالات في طلبات \"نقل الملكية\" كرماً عدم رفض الطلبات بشكل مباشر، ويتم تعليقها \" نقص الوثائق\" مع التوضيح في أسباب تعليق الطلب   (نقص بنود مع توضيح البند الناقص\") ليتم إحالتها لخدمة العملاء لطلب الوكالة الصحيحة. في حال رد العميل بالوكالة الصحيحة خلال يومين يتم إرفاقها في السيرفس ناو وتمرير الطلب. في حال رفض العميل إرفاق وكالة جديدة يتم رفض الطلب.","source":"الحوكمة","date":"4\/27\/2026","status":"Active","updateNote":""},{"mainCode":"CR-007","version":1,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"أجزاء خاصة - فرز","text":"\"لطلبات التصحيح\" في حالة كان الطلب السابق فرز وحدات ولم يتم فيه إضافة الاجزاء الخاصة والعميل يرغب بالتعديل واضافة اجزاء خاصه: يتم الاضافة من خلال خدمة التجاوز المقابل المالي","source":"الحوكمة","date":"1\/12\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-007","version":2,"type":"CR","category":"تفاصيل الصك","title":"رقم الوحدة - فرز","text":"يتم تعديل رقم الوحدة بناء على محضر الفرز بعد المطابقه والتحقق من المحضر","source":"الحوكمة","date":"4\/10\/2025","status":"Active","updateNote":""},{"mainCode":"CR-007","version":3,"type":"CR","category":"إعادة فرز","title":"إعادة الفرز","text":"في طلبات إعادة الفرز المقدمة من منصة خارجية وتختلف مدخلات الكسور مع نسبة الوحدة، يتم التعامل معها كالتالي: أولاً: يتم التحقق من أن الطلب تم إنشاءه من منصة خارجية. ثانياَ: التحقق من وجود المرفقات. ثالثاً: يتم قبول الطلب بتوصية من المدقق بالصيغة التالية:\"قبول الطلب، سيتم انشاء طلب تصحيح نسبة الوحدة من العقار\". وفي حال خلو الطلب من التوصية تتم إعادة الطلب.  - رفع طلب تصحيح داخلياً ومطابقة النسبة مع المحضر لكل وحدة.  - رفع انسدنت ريبورت لكل وحدة لتعديل رقم وكود الوحدة في حال لا تطابق المحضر وفي حال المطابقة لا حاجة لإنشاء طلب انسدنت.","source":"الحوكمة","date":"4\/9\/2025","status":"Active","updateNote":""},{"mainCode":"CR-008","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"موقع العقار - مخططين","text":"في حال كان العقار يقع على مخططين وارفق العميل مستند يفيد بوقوع العقار على احد المخططين يتم التصحيح بعد التحقق من صحة المستند","source":"الحوكمة","date":"1\/28\/2025","status":"Updated","updateNote":"تم تحديثه للآتي:\"في حال طلب العميل التعديل بناء على الأمانة والعقار يقع على مخططين وطلب العميل احد المخططين التي يقع عليها العقار فيتم التصحيح بناء على طلبه\""},{"mainCode":"CR-009","version":1,"type":"CR","category":"المراجعة, الوثائق و المستندات","title":"تعديل الاستخدام","text":"يتم الاستناد على المحاضر المعتمدة بعد التحقق من صحتها لتعديل أستخدام العقار","source":"الحوكمة","date":"1\/28\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-010","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"دمج الزائدة التنظيمية","text":"في حال رغبة العميل بدمج زائدة تنظيمية حسب محضر اللجنة الفنية والتقرير المساحي يتم تصحيح بدمج الزائدة التنظيمية عن طريق طلبات التصحيح","source":"الحوكمة","date":"1\/12\/2025","status":"Updated","updateNote":"يتم اتباع اجراء تسجيل الزائدة التنظيمية"},{"mainCode":"CR-010","version":2,"type":"CR","category":"التفاصيل الجيومكانية","title":"توحيد الاستخدام - دمج","text":"في حال تقديم طلب تصحيح بغرض توحيد الاستعمال لعقارات مراد دمجها يتم تعديل استخدام كل قطعة متأثرة بالدمج لتتوافق مع الاستخدام في المحضر بعد الدمج","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-011","version":1,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود","text":"في حال رغبة العميل بإزالة القيود عدم البيع والرهن والايجار والعقار مرهون يتم التعديل لـ ( عدم البيع ) عن طريق الانسدنت ريبورت","source":"الحوكمة","date":"2\/13\/2025","status":"Cancelled","updateNote":"تم تحديث للتعميمين الآتية:\"يتم إزالة القيود ( عدم رهن - عدم بيع - عدم إيجار )  في حال رفع طلب تصحيح من قبل المالك مع إرفاق خطاب من وزارة الاسكان يفيد بفك القيد حتى لو كان القيد مسجل في البورصة العقارية حتى الان  والابقاء على الرهن ان كان هناك رهن , بشرط التحقق من المستند من خلال الBO\" و \" فيما يتعلق بإجراء ازالة القيود : عدم ايجار وعدم رهن وعدم البيع :   يتم التصحيح بازالة القيود من خلال طلبات التصحيح ، مع التحقق من صحة ازالة القيود وفقا لاجراءات التسجيل الاول.    اجراء التصحيح : دراسة الحالة ويتم التحقق من ارفاق المدقق لصورة تثبت تاريخ انتهاء القيد المدون لكل قيد مراد ازالته.   تنوية: منصة المعالجة تعكس تاريخ نشاءة القيد بدلا من تاريخ انتهاء القيد فلا يتم اعادة الطلب لهذا السبب ملاحظة: في حال لم يتم ارفاق صورة توضح تدوين التاريخ بخانه تاريخ انتهاء القيد يتم اعادة الطلب للمدقق تحت توصية : يعاد للمدقق لارفاق صورة تاريخ انتهاء القيد   تنوية: لا يتم ازالة جميع القيود الا في حال وجود موافقة من الجهة المقيد لها\""},{"mainCode":"CR-011","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة حق الانتفاع - كهرباء","text":"في حال رغبة العميل بإزالة حق الانتفاع لغرفة الكهرباء نتيجة تسجيل خاطئ يتم ذلك عن طريق خدمة تجاوز المقابل المالي من خلال عملية إدارة الحقوق والقيود والالتزامات. وفي حال كان التسجيل صحيح وتم تقديم مستند يفيد بازالة الحق يتم إزالة الحق من خلال عملية إدارة الحقوق والقيود والالتزامات بمقابل المالي.","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":""},{"mainCode":"CR-012","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح أرقام القطع","text":"يتم تصحيح تقسيم ارقام القطع استناداً على البوابة المكانية او المستكشف الجغرافي لمنطقة العقار","source":"الحوكمة","date":"3\/6\/2025","status":"Cancelled","updateNote":""},{"mainCode":"CR-013","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح رقم القطعة","text":"في حال كان التصحيح لرقم القطعة بناء على البوابة المكانية او الصك فيتم التصحيح","source":"الحوكمة","date":"13\/3\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-013","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود - قرار واهب","text":"في حال كان ازالة القيود بناء على قرار من الواهب ، يتم إرفاق الصك الذي يثبت ملكية الواهب لصك السابق من خلال الثروة العقارية","source":"الحوكمة","date":"5\/28\/2025","status":"Active","updateNote":""},{"mainCode":"CR-013","version":3,"type":"CR","category":"التفاصيل الجيومكانية","title":"أولوية مستندات التصحيح","text":"في حال كان طلب تصحيح لرقم القطعة او مخطط او بلوك ، يتم التصحيح بمراعاة الترتيب الاتي: مستند رسمي باستثناء ( القرار المساحي ) الا بوجود خطاب يفيد بصحة التقرير المساحي ، بيانات الأمانة ( الخرائط الداعمة ) ، الصك","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-014","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تصحيح الاستعمال","text":"يتم تصحيح إستعمال للعقار في حال ذكر بيان الاستعمال في المستند الرسمي ، ولايتم تعديله استناداً على نوع مبنى او نوع البناء.","source":"الحوكمة","date":"5\/8\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-015","version":1,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"إزالة القيود - تصحيح","text":"فيما يتعلق بإجراء ازالة القيود : عدم ايجار وعدم رهن وعدم البيع :   يتم التصحيح بازالة القيود من خلال طلبات التصحيح ، مع التحقق من صحة ازالة القيود وفقا لاجراءات التسجيل الاول.    اجراء التصحيح : دراسة الحالة ويتم التحقق من ارفاق المدقق لصورة تثبت تاريخ انتهاء القيد المدون لكل قيد مراد ازالته.   تنوية: منصة المعالجة تعكس تاريخ نشاءة القيد بدلا من تاريخ انتهاء القيد فلا يتم اعادة الطلب لهذا السبب ملاحظة: في حال لم يتم ارفاق صورة توضح تدوين التاريخ بخانه تاريخ انتهاء القيد يتم اعادة الطلب للمدقق تحت توصية : يعاد للمدقق لارفاق صورة تاريخ انتهاء القيد   تنوية: لا يتم ازالة جميع القيود الا في حال وجود موافقة من الجهة المقيد لها","source":"الحوكمة","date":"5\/22\/2025","status":"Active","updateNote":""},{"mainCode":"CR-016","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"اختلاف رقم البلوك","text":"في حال اختلاف رقم البلوك بين البيانات المسحوبة والأمانة أو أي خرائط مرجعية، يحق للعميل طلب تصحيح رقم البلوك.","source":"الحوكمة","date":"6\/30\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-017","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"نوع وحالة واستعمال العقار","text":"في حال طلب تصحيح لاستعمال او نوع العقار او حالة العقار فيتم تصحيح نوع العقار و استعمال العقار وحالة العقار معاً مع مراعاة عدم الاختلاف","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-017","version":2,"type":"CR","category":"الحقوق, القيود، والالتزامات","title":"تعديل قيمة الرهن","text":"في حال وجود طلب تصحيح  بتعديل قيمة الرهن يتم التعديل من خلال عمليات التصحيح اذا  كان تسجيل الحق بشكل خاطئ من خلال التسجيل الاول او من خلال عملية ادارة الحقوق والقيود والالتزامات في الفرع.  - في حال كان الخطأ عن طريق مسجل خارجي او العميل يتم رفض الطلب يتطلب رفع طلب عن طريق خدمة تعديل الرهن .","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-017","version":3,"type":"CR","category":"التفاصيل الجيومكانية","title":"حالة العقار - مصورات جوية","text":"في حال طلب تصحيح لحالة العقار ، يتم الاستناد على المصورات الجوية من خلال المنصة و الـ PCP فقط ، وفي حال الاختلاف يتم التصحيح بما يتوافق مع مدخل العميل.","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-017","version":4,"type":"CR","category":"التفاصيل الجيومكانية","title":"نوع العقار - وجود مبنى","text":"في حال طلب تصحيح لنوع العقار ، فيتم التصحيح بما يتوافق مع الاستخدام بشرط وجود مبنى بالاستناد على المصورات الجوية من خلال المنصة و ال PCP مثال: الاستخدام سكني يتم وضع نوع العقار مبنى سكني - الاستخدام: خدمات عامة يتم وضع نوع العقار : مرفق خدمة","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-018","version":1,"type":"CR","category":"التفاصيل الجيومكانية","title":"تعديل بيانات الأمانة - جيومكاني","text":"في حال وجود طلب تعديل بيانات يتم سحبها من الامانه ( اسم حي - اسم مدينه ) يتم إحالة الطلب للجيومكاني للتعديل وفي حال لم يتم التعديل من قبلهم يتم رفض الطلب","source":"الحوكمة","date":"7\/17\/2025","status":"Cancelled","updateNote":""},{"mainCode":"CR-018","version":2,"type":"CR","category":"التصحيح","title":"رفع الإيقاف - رفض","text":"في حال طلب العميل رفع الإيقاف من خلال عملية التصحيح، يتم رفض طلب التصحيح واختيار السبب أخرى وصيغة الرفض \"عزيزي العميل حرصًا على تنفيذ طلب الإيقاف، يجب توفير المستندات المطلوبة وتسهيلًا عليكم نرجو التواصل مع فريق دعم العملاء وتوفير معلومات طلبكم من خلال رقم التواصل: 199002 أو البريد الالكتروني infocs@rer.sa\"","source":"الحوكمة","date":"9\/3\/2025","status":"Active","updateNote":""},{"mainCode":"CR-018","version":3,"type":"CR","category":"تصحيح","title":"رفض تصحيح اسم المدينة","text":"فيما يخص طلبات تصحيح اسم المدينة، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"10\/7\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-019","version":1,"type":"CR","category":"البيانات الجيومكانية","title":"طلب تصحيح على أحد المخططين","text":"في حال طلب العميل التعديل بناء على الأمانة والعقار يقع على مخططين وطلب العميل احد المخططين التي يقع عليها العقار فيتم التصحيح بناء على طلبه","source":"الحوكمة","date":"7\/31\/2025","status":"Active","updateNote":""},{"mainCode":"CR-020","version":1,"type":"CR","category":"التصحيح","title":"إشعار العميل - إنشاء داخلي","text":"في طلبات التصحيح عن طريق الإنشاء الداخلي يجب التحقق من تفعيل خاصية إشعار العميل من قبل منشئ الطلب ويتم توثيق بتمكين إشعارات الرسائل النصية عبر تصوير الشاشة وإرفاقه في نظام ServiceNow. ثم تتم معالجته ومراجعته من قِبل مدقق والمسجِّل و مراقب الجودة، وفي حال عدم إرفاق صورة من (التأشير بتمكين إشعارات الرسائل النصية للعميل) يعاد لإضافة التوثيق وفي حال لا يوجد توثيق يُلغى الطلب، ويلزم إنشاء طلب جديد مكتمل المتطلبات. للتنوية:  يُستثنى من التأشير \"إشعار المستفيد\" الطلبات المقدمة من الفرع فقط","source":"الحوكمة","date":"9\/22\/2025","status":"Active","updateNote":""},{"mainCode":"CR-021","version":1,"type":"CR","category":"تصحيح","title":"الرقم الموحد - صندوق التنمية","text":"الرقم الموحد لصندوق التنمية الزراعية","source":"الحوكمة","date":"10\/2\/2025","status":"Active","updateNote":""},{"mainCode":"CR-022","version":1,"type":"CR","category":"تصحيح","title":"مستندات تصحيح الاستعمال","text":"بالنسبة للطلبات المتعلقة بتصحيح إستعمال العقار، يتم الاعتماد على أي من المستندات التالية (وفق المتوفر منها): رخصة البناء. شهادة إتمام البناء. شهادة الأشغال. بيانات الأمانات. وفي حال عدم توفر أي من المستندات الداعمة أعلاه، يُرفض الطلب. أما فيما يخص طلبات تصحيح نوع العقار، فيتم الإعتماد على أي من المستندات التالية (وفق المتوفر منها): شهادة إتمام البناء. شهادة الأشغال. بيانات الأمانات. وفي حال عدم توفر أي من المستندات اعلاه، يُرفض الطلب.","source":"الحوكمة","date":"10\/9\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"CR-010","version":3,"type":"CR","category":"تصحيح","title":"محاضر القصيم - الدمج","text":"فيما يخص محاضر منطقة القصيم التي تم إعادتها من الجيو بتوصية (لايمكن التصحيح بناءً على مخططات تم اعتمادها لعقارات مسجلة سابقاً تسجيلاً صحيحاً بناءً على بيانات الصك ) الحالة الأولى؛ في حال أفاد المحضر بتجزئة القطعة إلى عدة قطع، أي تغير عدد القطع بمساحة وأطوال لكل قطعة، تصنف كعملية تجزئة الإجراء؛ رفض الطلب و احالته لفريق دعم العملاء. ويتم إشعار العميل بتنفيذ الخدمة عن طريق تقديم طلب فرز قطع   الحالة الثانية؛ في حال افاد المحضر بـ بقاء مساحة و أطوال القطعة كما هي.  الإجراء؛ يتم تمرير الطلب وتعتبر كعملية تصحيح للبيانات الوصفية.    الحالة الثالثة؛ في حال أفاد المحضر بعملية دمج، كرماً تعليقة ليتم دراسته.","source":"الحوكمة","date":"10\/14\/2025","status":"Active","updateNote":""},{"mainCode":"CR-023","version":2,"type":"CR","category":"تصحيح","title":"محاضر القصيم - رمز المحضر","text":"فيما يخص محاضر منطقة القصيم التي تتضمن رمز المحضر في القرارات الإبتدائية والنهائية والمحاضر الصادرة من بلدي، يتم التحقق من خلالها عن طريق مسح رمز المحضر. ولا يوجد حاجة للتحقق من المسارات التشغيلية.","source":"الحوكمة","date":"10\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":3,"type":"CR","category":"تصحيح","title":"استثناء القصيم - المساحة","text":"إشارة إلى توجيه الهيئة العامة للعقار باستثناء طلبات التعديل على أراضي في منطقة القصيم من حيث (الأطوال، والبيانات الجيومكانية)، يتم الاكتفاء  بالقرار المساحي الصادر من أمانة منطقة القصيم عند الرغبة في تحديثه أو التعديل عليه، دون الحاجة إلى طلب إرفاق خطاب من جهة الاختصاص يفيد بتعديل .   وبناء عليه سيتم معالجة الطلبات منطقة القصيم التي تتضمن تعديل البيانات الجيومكانية من خلال خدمة التصحيح بموجب قرار مساحي فقط","source":"الحوكمة","date":"29\/1\/2026","status":"Active","updateNote":""},{"mainCode":"SR-MG-001","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الأطوال","text":"في حال اختلاف الاطوال بين المحضر ورسم الجيومكاني 1مثال \\ 9,48 بالمحضر ورسم الجيومكاني 9,4 يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"تقريب المساحة","text":"في حال تقريب المساحة في طلبات الفرز والدمج يتم تمرير الطلب مثال المحضر 500.9 الرسم الجيومكاني 501","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":2,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف المساحة ≤ 90سم","text":"في حال نتج اختلاف في المساحة عند تطبيق المحضر والرسم الجيومكاني في الدمج او الفرز وكان الاختلاف 90 سم او اقل يتم تمرير الطلب","source":"الحوكمة","date":"12\/22\/2024","status":"Updated","updateNote":"تم تحديثه وعكسه في تعليمات عمل (SR-MG)"},{"mainCode":"SR-MG-002","version":3,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"اختلاف الاتجاهات","text":"في حال اختلاف الاتجاهات بين المحضر ورسم الجيو يتم القبول في حال كان اجمالي الاطوال والمساحة في الجيومكاني مطابق للمحضر ( في حال المحضر مذكور به رقم العقار وليس رقم صك العدل )","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-002","version":5,"type":"SR, MG","category":"الحقوق, القيود، والالتزامات","title":"الأجزاء الخاصة - فرز الوحدات","text":"في حال تكرر نوع الجزء الخاص ومساحة الجزء الخاص في محضر الفرز لطلبات فرز الوحدات، يتم تمرير الطلب بتسجيل الأجزاء الخاصة دون تكرار","source":"الحوكمة","date":"7\/28\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-003","version":1,"type":"SR, MG","category":"التفاصيل الجيومكانية","title":"رقم العقار - عدم توفر حدود","text":"في حال عدم توفر حدود للعقار ما قبل الفرز او ما قبل الدمج وتوفر رقم العقار وتم التحقق من صحته يتم تمرير الطلب","source":"الحوكمة","date":"12\/26\/2024","status":"Updated","updateNote":"تعليمات العمل \"التجزئة\""},{"mainCode":"SR-MG-004","version":2,"type":"SR, MG","category":"تفاصيل الصك","title":"اختلاف اسم المالك","text":"في حال كان اسم المالك مختلف عن اسم المالك في المحضر يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"SR-MG-005","version":1,"type":"SR, MG","category":"المراجعة, الوثائق و المستندات","title":"محضر غير معتمد - منصة خارجية","text":"في حال لم يتم اعتماد المحضر - في خانة تاريخ الاعتماد وكان مقدم الطلب منصة خارجية يتم تمرير الطلب","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-006","version":1,"type":"SR, MG","category":"المراجعة, الوثائق و المستندات","title":"المخطط الورقي","text":"يتم التجزئة وفق المخطط الورقي و يتم الأعتماد عليها في حالة وجود المخطط في الأرشفة الخاصة بالبوابة المكانية او في حالة تم ارساله لنا من قبل الـ BO و يتم القبول مع اجتزاء غرفة الكهرباء من العقار في حالة كانت موجودة في المخطط الورقي","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-007","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"ختم طبق الأصل","text":"يتم التحقق من المحاضر بختم طبق الأصل، تتم من خلال مطابقة بيانات العقار في المحضر مع صك تسجيل الملكية.","source":"الحوكمة","date":"3\/6\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (MG)  تم عكسه في تعليمات العميل (SR)"},{"mainCode":"SR-MG-009","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"محاضر رسمية - بريد الكتروني","text":"يتم الاعتماد على المحاضر الوارده في حال وصولها من بشكل رسمي ( عن طريق البريد الالكتروني ) حتى ولو لم تتضمن ختم او باركود بسبب وصولها بشكل رسمي ولضمان صحتها.","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (MG)  تم عكسه في تعليمات العميل (SR)"},{"mainCode":"SR-MG-010","version":1,"type":"SR, MG","category":"الوثائق و المستندات","title":"أطوال رسم الكروكي","text":"لا يتم الاعتماد على الاطوال الوارد برسم الكروكي بالمحضر او المستند الرسمي في حال لم تذكر بالجدول ويلزم تعديل المستند، وفي حال ذكرت الاطوال في كل من الجدول والرسم الكوروكي وطبق الجيومكاني الاطوال وفقا للرسم الكروكي لوجود خطا في الاطوال في الجدول فيتم الاستناد على الاطوال في الرسم الكوروكي","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تم عكسه في كل من تعليمات العمل (MG-SR)"},{"mainCode":"MG-001","version":1,"type":"MG","category":"التفاصيل الجيومكانية","title":"اختلاف حد العقار - الدمج","text":"في حال اختلف حد من حدود العقار قبل الدمج او بعد الدمج يتم تمرير الطلب","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MG-002","version":1,"type":"MG","category":"التفاصيل الجيومكانية","title":"مساحة ما بعد الدمج","text":"في حال كانت المساحة ما بعد الدمج غير متوفرة يتم تمرير الطلب في حال إمكانية معرفة المساحة من الاطوال","source":"الحوكمة","date":"1\/2\/2025","status":"Active","updateNote":""},{"mainCode":"MG-002","version":2,"type":"MG","category":"التفاصيل الجيومكانية","title":"اختلاف مجموع مساحات الدمج","text":"في حال وجود اختلاف بمجموع مساحات القطع قبل الدمج ومساحة القطعة بعد الدمج بأقل من واحد متر يتم قبول الطلب سواء كان الفرق زيادة او نقص","source":"الحوكمة","date":"3\/6\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (MG)"},{"mainCode":"SR-001","version":1,"type":"SR","category":"فرز المخططات","title":"تعليمات فرز المخططات","text":"في طلبات فرز المخططات يتم اتباع الآتي: في الصكوك التي ينعكس فيها استخدام العقار بشكل خاطئ، يتم رفع انسدنت ريبورت لتعديل الاستخدام بعد قبول الطلب مباشرة. لا يتم مطابقة مساحات المرافق العامة مالم تكن في ملكية صاحب الحق، ويتم رفع طلب حذف تسجيل الصك بعد قبول الطلب مباشرة. تخصم من مساحات القطع الي تحوي غرف كهرب وفق مساحة غرف الكهرب في المحضر.","source":"الحوكمة","date":"12\/26\/2024","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (SR)"},{"mainCode":"SR-002","version":1,"type":"SR","category":"المراجعة, الوثائق و المستندات","title":"محضر غير رسمي - فرز","text":"في حال ظهور ( المحضر غير رسمي ) بمحاضر فرز الوحدات تصنف كنقص وثائق اذ كان الطلب مقدم من المستفيد ، وفي حال كان الطلب مقدم من منصة فرز يتم التواصل مع الـ BO .","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":2,"type":"SR","category":"تفاصيل الصك","title":"نسب الوحدات من الأرض","text":"في حال كان مجموع نسب الوحدات من الأرض بمحاضر الفرز مابين 97% - 103% يتم قبول الطلب","source":"الحوكمة","date":"1\/28\/2026","status":"Active","updateNote":""},{"mainCode":"SR-002","version":3,"type":"SR","category":"الحقوق, القيود، والالتزامات","title":"إزالة حق الانتفاع - فرز مرهون","text":"عمليات فرز الوحدات يتم إزالة حق الانتفاع عن الصك الأساس اولاً عن طريق خدمة التجاوز المالي ، ومن ثم تتم عملية الفرز عن طريق التجاوز المالي","source":"الحوكمة","date":"3\/6\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":5,"type":"SR","category":"تفاصيل الصك","title":"الأجزاء الخاصة - تمرير","text":"فيما يتعلق بطلبات فرز الوحدات المتضمنة للاجزاء الخاصة : يتم تمرير الطلبات كما في السابق ( دون الحاجة لاضافة الاجزاء الخاصة ) الى حين اطلاق التحديث","source":"الحوكمة","date":"5\/14\/2025","status":"Updated","updateNote":"حدث التعميم وفقا للتعميم \"في طلبات فرز الوحدات ، في حال وجود اجزاء خاصة ولم تضاف ، يعاد للمدقق للتحقق من اضافة الاجزاء الخاصة.\""},{"mainCode":"SR-002","version":6,"type":"SR","category":"التفاصيل الجيومكانية","title":"إعادة المدقق - الأجزاء الخاصة","text":"في طلبات فرز الوحدات ، في حال وجود اجزاء خاصة ولم تضاف ، يعاد للمدقق للتحقق من اضافة الاجزاء الخاصة.","source":"الجودة","date":"5\/15\/2025","status":"Active","updateNote":""},{"mainCode":"SR-002","version":8,"type":"SR","category":"التفاصيل الجيومكانية","title":"رقم السند - فرز الوحدات","text":"فيما يتعلق بطلبات فرز الوحدات المتضمنة للاجزاء الخاصة يتم الاعتماد في رقم السند على اضافة رقم المحضر ورقم الطلب","source":"الحوكمة","date":"5\/18\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (SR)"},{"mainCode":"SR-002","version":9,"type":"SR","category":"الحقوق, القيود، والالتزامات","title":"فرز عقار مرهون - رهن جزئي","text":"في حال وصول طلب تجزئة او فرز لعقار مرهون متضمن خطاب يفيد بسريان الرهن على بعض العقارات دون الأخرى بعد عملية الفرز او التجزئة يتم معالجة الطلب","source":"الحوكمة","date":"7\/17\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (SR)"},{"mainCode":"SR-003","version":1,"type":"SR","category":"التفاصيل الجيومكانية","title":"غرفة الكهرباء - تجزئة","text":"في حال كانت غرفة الكهرباء مضمنة بالرسم والعميل يرغب بتجزئة القطعة وبعد التجزئة لاتتضمن كل القطع غرفة كهرباء يتم إزالة الحق أولا عن طريق خدمة التجاوز المالي ، و يتم تجزئة القطع عن طريق التجاوز المالي ، ويتم إضافة الحق عن طريق التجاوز المالي للقطع التي تحتوي غرفة الكهرباء بعد الانتهاء من طلب التجزئة","source":"الحوكمة","date":"3\/6\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (SR)"},{"mainCode":"SR-004","version":1,"type":"SR","category":"التفاصيل الجيومكانية","title":"حق الانتفاع - تجزئة","text":"في حال وجود طلب تجزئة قطع أراضي والعقار الأساس يوجد عليه حق انتفاع ، يتم قبول ومن ثم يتم إزالة حق الانتفاع عن القطع التي لاتحتوي غرفة كهرب بعد التجزئة عن طريق خدمة التجاوز المالي","source":"الحوكمة","date":"3\/6\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (SR)"},{"mainCode":"SR-005","version":1,"type":"SR","category":"تفاصيل الصك","title":"ملكية مشتركة - تجزئة","text":"في حال وصول طلب تجزئة لعقار يتضمن اكثر من مالك ويوجد ملاحظة تفيد برغبة الملاك بتملك كل مالك لأحد العقارات بعد عملية التجزئة ( دون وجود نموذج توزيع النسب ) ، يتم افادة خدمة العملاء للتواصل مع العميل وتوجيه للفرع","source":"الحوكمة","date":"7\/17\/2025","status":"Active","updateNote":""},{"mainCode":"SR-006","version":1,"type":"SR","category":"فرز","title":"محاضر الشرقية - باركود","text":"فيما يخص اي طلبات محاضر تحتوي على باركود بدون توقيع مثل المحاضر اللي وصلتنا من امانة منطقة الشرقيه فيتم تعليقها هولد حوكمة وعدم إحالتها للجيومكاني","source":"الحوكمة","date":"9\/9\/2025","status":"Updated","updateNote":"العمل بآلية التحقق من المحاضر المذكور في تعليمات العمل"},{"mainCode":"SR-007","version":1,"type":"SR","category":"فرز","title":"محاضر الشرقية المعلقة","text":"تعميم فيما يخص طلبات محاضر الشرقية المعلقة مسبقاً بناءً على توجيه الحوكمة فسيتم العمل وفق التعميم بخطوات التحقق من الباركود والتوقيع","source":"الحوكمة","date":"9\/15\/2025","status":"Updated","updateNote":"العمل بآلية التحقق من المحاضر المذكور في تعليمات العمل"},{"mainCode":"SR-MG-CR-001","version":1,"type":"SR, MG, CR","category":"المراجعة, الوثائق و المستندات","title":"الاعتماد على الاحداثيات","text":"بالإمكان الاعتماد على الاحداثيات بالمحضر لتحديد موقع القطعة","source":"الحوكمة","date":"1\/12\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-002","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"اجتزاء غرفة الكهرباء - تنازل","text":"يتم اجتزاء غرفة الكهرباء في حال تنازل صاحب العلاقة عن المساحة لصالح شركة الكهرباء.","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-003","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"اجتزاء غرفة الكهرباء - مرفق","text":"يتم اجتزاء غرفة الكهرباء في حال تم ذكر ذلك بالمرفقات بعد التحقق من صحة المرفق","source":"الحوكمة","date":"1\/16\/2025","status":"Active","updateNote":""},{"mainCode":"SR-MG-CR-004","version":1,"type":"SR, MG, CR","category":"التفاصيل الجيومكانية","title":"استخدام العقار - المحضر","text":"في حال اختلاف استخدام العقار بين بيانات الأمانة والمحضر يتم الاستناد على استخدام العقار من خلال المحضر","source":"الحوكمة","date":"1\/22\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (CR)"},{"mainCode":"MR-001","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"حق الإيجار - وثيقة","text":"في حال طلب إضافة حق الايجار هل يستلزم وجود وثيقة عقد الايجار ؟ يتم قبول الطلب في حال وجود موافقة الأطراف","source":"الحوكمة","date":"","status":"Cancelled","updateNote":"تم عكسه في تعليمات العمل (MR)"},{"mainCode":"MR-002","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"رهن - نفس المالك","text":"في حال تقديم مالك العقار طلب إضافة حق رهن لنفس المالك يتم رفض الطلب - بتوصية ( عزيزي العميل ، البيانات المدخلة لصاحب الحق غير صحيحة)","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MR-002","version":2,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"نقل حق الانتفاع - تصحيح","text":"في حال قدم العميل طلب فك او تعديل القيد وذلك بسبب ان حق الانتفاع لم ينتقل بعد عملية نقل الملكية فيتم إنشاء طلب بخدمة تجاوز المقابل المالي لنقل الحق من المالك السابق للمالك الحالي ورفع تذكر استرداد المقابل المالي ، والغاء الطلب الحالي","source":"الحوكمة","date":"8\/27\/2025","status":"Updated","updateNote":"تم تحديث التعميم كالآتي: حال قدم العميل طلب فك او تعديل القيد بسبب ان حق الانتفاع لم ينتقل للمالك الحالي بعد عملية نقل الملكية فيتم التعامل مع الحالات كالتالي؛ 1\/ في حال لم يتم تسجيل الأجزاء الخاصة: يتم رفض الطلب مع استرداد المقابل المالي، ويتم إنشاء طلب تصحيح لإضافة الأجزاء الخاصة.  2\/ في حال تم تسجيل الأجزاء الخاصة مسبقاً: يتم رفض الطلب مع استرداد المقابل المالي، وفك حق الانتفاع بتجاوز المقابل المالي. بالتوصية التالية: \"عزيزي المستفيد، سيتم رفض طلبكم الحالي وإنشاء طلب بديل مستوفٍ للبيانات النظامية، لمعرفة رقم الطلب الجديد، يرجى التواصل مع خدمة العملاء على الرقم 199002.\""},{"mainCode":"MR-003","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"مرفق ينافي الخدمة","text":"في حال وجود طلب ( ادارة حقوق وقيود والتزامات ) المرفق ينافي الخدمة المختارة بالمنصة ، يتم الرجوع للـ bo للتحقق من المراد من الخدمة في حال كان مقدم الطلب منصة خارجية, وفي حال كان مقدم الطلب العميل يتم التواصل مع خدمة العملاء ( في حال كان الخدمة الصحيحة مخالفة للطلب بالمنصة يتم رفض الطلب ويتم رفع طلب عن طريق خدمة تجاوز المقابل المالي لاتمام العملية الصحيحة ) ويستثنى منها طلبات ( إضافة - فك الرهن) يتم معالجة الطلب استنادًا على موافقة أطراف العلاقة ولا يلزم التحقق من الوثائق المرفقة","source":"الحوكمة","date":"22\/12\/2025","status":"Updated","updateNote":"تعليمات العمل\"إدارة الحقوق\""},{"mainCode":"MR-004","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"رهن إضافي - نفس الجهة","text":"في حال رغبة العميل إضافة حق رهن اخر لنفس الجهة الراهنه الأولى ، يتم إضافة الحق بشكل مستقل","source":"الحوكمة","date":"","status":"Active","updateNote":""},{"mainCode":"MR-005","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"موافقة أطراف - شركة","text":"يكتفى بموافقة جميع الأطراف بحال وصول طلب إضافة او إزالة رهن وأحد الأطراف شركة حتى ولو لم يتضمن الطلب أي مستند","source":"الحوكمة","date":"","status":"Updated","updateNote":"تعليمات العمل\"إدارة الحقوق\""},{"mainCode":"MR-006","version":1,"type":"MR","category":"فرز","title":"رهن منتهي التاريخ","text":"في حال تقديم العميل طلبًا لإضافة رهن وكان تاريخ نهاية الرهن منتهي، وتم التحقق من العميل يتم إزالة تاريخ الانتهاء من الطلب وتمريره.","source":"الحوكمة","date":"9\/16\/2025","status":"Updated","updateNote":"تعليمات العمل\"إدارة الحقوق\""},{"mainCode":"DT-001","version":1,"type":"DT","category":"نقل ملكية","title":"هبة - قيود موهوبين","text":"في حال عملية نقل الملكية بهبة المتضمنة قيود على الموهوبين دون ذكر تفاصيل القيد بشكل مفصل يتم قبول الطلب في حال وجود الموافقات بشرط عدم تكرار القيد","source":"الحوكمة","date":"","status":"Updated","updateNote":"تم عكسه في تعليمات العمل نسخة 1.8 ص12"},{"mainCode":"DT-002","version":1,"type":"DT","category":"نقل ملكية","title":"هبة - قيود واهب","text":"في حال تضمن الهبة قيود على الواهب دون ذكر تفاصيل يتم قبول الطلب في حال وجود الموافقات بشرط ذكر قيد واحد فقط لا اكثر","source":"الحوكمة","date":"","status":"Updated","updateNote":"تم عكسه في تعليمات العمل نسخة 1.8 ص12"},{"mainCode":"DT-MR-001","version":1,"type":"DT-MR","category":"نقل ملكية ، الحقوق، القيود، و الإلتزامات","title":"حالة العقار - إيقاف","text":"يكتفى بحالة المنطقة في المنصة للتحقق من حالة العقار وفي حال وجود إيقاف يتم الرجوع للمناطق العقارية والتحقق من حالة العقار وذلك في طلبات نقل الملكية","source":"الحوكمة","date":"","status":"Updated","updateNote":"تم عكسه في تعليمات عمل نقل الملكية"},{"mainCode":"MR-DT-001","version":1,"type":"DT-MR","category":"الحقوق، القيود، و الإلتزامات  نقل الملكية","title":"التحقق من الوكالات","text":"آلية التحقق من الوكالات للأفراد والمؤسسات والشركات بشكل تفصيلي وفق عدد المدراء والصلاحيات","source":"الحوكمة","date":"","status":"Updated","updateNote":"تم عكسه في تعليمات عمل نقل الملكية"},{"mainCode":"GEN-001","version":1,"type":"CR","category":"تصحيح","title":"إشكالية المقابل المالي","text":"1-طلبات التصرفات التي تنشأ بدفع مقابل من العميل مثل الفرز والدمج ونقل الملكية وإدارة الحقوق والقيود؛ ويوجد إشكالية في الطلبات ولا يمكن قبولها – أي سيتم رفضها بناءً على تعليمات العمل-. يتم إفادة تشغيل العمليات  للتواصل مع المستفيد لاسترداد المقابل المالي.   2-في حال وجود تحدي في طلب مقدم من العميل والحالة تتطلب إلغاءه وإنشاء طلب بتجاوز المقابل المالي   الحالة الأولى:في حال كان خطأ داخلي أو عدم دعم المنصة: يتم الإلغاء وإنشاء طلب بتجاوز المقابل المالي؛ وإفادة تشغيل العمليات برقم الطلب للتواصل مع المستفيد لاسترداد المقابل المالي.   الحالة الثانية:في حال كان تحدي في الطلب وسيتم إعادة تقديمه: يتم الإلغاء وإنشاء طلب بتجاوز المقابل المالي.   آلية التواصل مع تشغيل العمليات لإفادة العميل بعد رفض الطلب أو إلغاءه 1- يتم تزويد قائد الفريق أو من ينوب عنه برقم الطلب. 2-يتم حصر جميع الطلبات نهاية كل يوم من كل قائد فريق. 3- يتم إرسال الطلبات جميعها مرة واحدة في المجموعة الخاصة من قبل قادة الفرق.","source":"الحوكمة","date":"10\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":2,"type":"CR","category":"تصحيح","title":"استعمال العقار - المحاضر","text":"فيما يخص إستعمال العقار، يمكن الإستناد على المحاضر من ضمن المستندات التي يمكن فيها تغيير الإستعمال.","source":"الحوكمة","date":"9\/12\/2025","status":"Active","updateNote":"تم عكسه في تعليمات عمل (CR)"},{"mainCode":"GEN-002","version":3,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"حقوق الانتفاع - موافقة أطراف","text":"فيما يخص طلبات إضافة حقوق الإنتفاع التي لا تتضمّن مرفقات داعمة، يمكن تمرير طلبات حقوق الإنتفاع بموافقة الأطراف ويُستثنى من ذلك في حال وجود تعارض ما بين الخدمة المطلوبة مع إفادة أو مرفقات المستفيد.","source":"الحوكمة","date":"9\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":4,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"فك الرهن - موافقة أطراف","text":"فيما يخص طلبات فك الرهن فـ يتم معالجة الطلب استنادًا على موافقة أطراف العلاقة وفك الرهن ولا يلزم التحقق من الوثائق المرفقة.","source":"الحوكمة","date":"4\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-002","version":5,"type":"","category":"","title":"إلغاء التصحيح بعد الانسدنت","text":"فيما يخص طلبات التصحيح التي يتم تنفيذها من خلال تقرير الحادثة، يتم إلغاء طلب التصحيح كون التصحيح تم من خلال تقرير الحادثة على أن تكون توصية الإلغاء: \"عزيزي المستفيد، تمت معالجة طلبكم.\"","source":"الحوكمة","date":"9\/4\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"GEN-002","version":6,"type":"","category":"","title":"الأجزاء الخاصة - إضافة بانسدنت","text":"فيما يخص طلبات التصحيح لـ إضافة الأجزاء الخاصة   يتم التحقق أن محضر الفرز السابق لا يحتوي على أجزاء خاصة \" يرجى التحقق في حال وجود اجزاء خاصة في المحضر السابق ولم يتم إضافتها لعدم دعم المنصة، تضاف مباشرة دون فوترة العملية\" يتم تعليق الطلب كـ (نقص وثائق) مع كتابة \"إضافة أجزاء خاصة بموجب الفاتورة\" في خانة الأسباب الأخرى لتعليق الطلب وذلك لإستيفاء المقابل المالي للعملية (300 ريال). بعد عودة الطلب بالفاتورة؛ يتم إرفاق الفاتورة في طلب التصحيح. تعديل البيانات وقبول الطلب  في حال لم يتم إرفاق الفاتورة في الطلب يتم إعادة الطلب لمدقق البيانات لإرفاق الفاتورة.  في حال عدم رغبة المستفيد بسداد المقابل المالي للعملية، يتم رفض الطلب بتوصية:- \"عزيزي المستفيد، تم رفض طلبكم الحالي لعدم استيفاء المقابل المالي\".","source":"الحوكمة","date":"4\/14\/2026","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"GEN-003","version":1,"type":"","category":"","title":"أولوية المستندات - الجيومكاني","text":"في ما يخص طلبات التصحيح التي تُحال للجيومكاني لتعديل رقم القطعة أو رقم المخطط أو البلوك، في حال العميل أرفق اكثر من مستند فيتم التصحيح وفقًا لأولوية المستندات.","source":"الحوكمة","date":"10\/22\/2025","status":"Updated","updateNote":"تم تحديثه وعكسه في تعليمات العمل (CR)"},{"mainCode":"GEN-003","version":2,"type":"","category":"","title":"رفض تصحيح اسم الحي","text":"فيما يخص طلبات تصحيح اسم الحي، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"11\/18\/2025","status":"Updated","updateNote":"تم تحديث التعميم للآتي:\"في حال تقدم المستفيد بطلب لتصحيح الحي، يتم دراسة الطلب ومراعاة الآتي: التحقق من المدينة التي يقع فيها الحي: في حال الحي المراد التصحيح إليه داخل منطقة الرياض، يتم دراسة الطلب والتحقق من البلوك الذي يقع عليه العقار والبلوك المجاور للتحقق من الحي وفي حال وجود قرار مساحي يتم الاستئناس به في الدراسة ويتم التصحيح عن طريق تقرير الحادثة. في حال الحي المراد التصحيح إليه خارج منطقة الرياض؛ يتم رفض الطلب حسب التوصية المعتمدة مسبقًا.\""},{"mainCode":"CR-025","version":1,"type":"CR","category":"تصحيح","title":"تصحيح الحي","text":"في حال تقدم المستفيد بطلب لتصحيح الحي، يتم دراسة الطلب ومراعاة الآتي: التحقق من المدينة التي يقع فيها الحي: في حال الحي المراد التصحيح إليه  داخل منطقة الرياض، يتم دراسة الطلب والتحقق من البلوك الذي يقع عليه العقار والبلوك المجاور للتحقق من الحي وفي حال وجود قرار مساحي يتم الاستئناس به في الدراسة ويتم التصحيح عن طريق تقرير الحادثة. في حال الحي المراد التصحيح إليه خارج منطقة الرياض؛ يتم رفض الطلب حسب التوصية المعتمدة مسبقًا.","source":"الحوكمة","date":"5\/14\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-003","version":3,"type":"","category":"","title":"توصية الجيو - رفض الاستعمال","text":"بالنسبة لطلبات تغيير الاستعمال التي يتم إحالتها للجيومكاني ويتم رفض تغيير الاستعمال بتوصية إرفاق خطاب من الأمانة فيتم الاستناد على توصية الجيو ورفض الطلب.","source":"الحوكمة","date":"2\/12\/2025","status":"Updated","updateNote":"تم عكسه في تعليمات العمل (CR)"},{"mainCode":"GEN-003","version":4,"type":"SR,MG,CR","category":"الوثائق و المستندات","title":"ترتيب التقسيم - رقم القطعة","text":"في حال يوجد اختلاف في ترتيب التقسيم في رقم القطعة بين المحضر وتطبيق الجيو فيتم تمرير الطلب دون الحاجة لإعادة الطلب للجيومكاني.","source":"الحوكمة","date":"18\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":1,"type":"","category":"","title":"تعدد الرهن - تجزئة","text":"في حال تعدد الرهن بعد تجزئة العقار\/ فرز العقار\/إعادة التجزئة وانتقل الرهن إلى العقارات الأخرى، ففي حال رغبة المستفيد بإزالة الرهن يتم من خلال تقديم طلب من قبل المستفيد بمقابل مالي.","source":"الحوكمة","date":"11\/10\/2025","status":"Updated","updateNote":"تعليمات عمل \"إدارة الحقوق\""},{"mainCode":"GEN-004","version":2,"type":"SR","category":"الوثائق و المستندات","title":"نزع الملكية - آلية الفرز","text":"بشأن نزع الملكية لصالح عقارات الدولة، يتم تنفيذ الآلية أدناه بالموائمة مع الزملاء في تشغيل العمليات: فرز العقارات المتأثرة من نزع الملكية التنسيق مع مالك العقار لزيارة الفرع تنفيذ خدمة الفرز بناء على بيانات المحضر، ودفع المقابل المالي   نقل ملكية العقار الذي تم تجزئته بناء على المحضر والمقرر نزعه التنسيق مع مالك العقار وممثل عقارات الدولة لزيارة الفرع نقل ملكية العقار، ودفع المقابل المالي\"","source":"الحوكمة","date":"23\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":3,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"الفرز - إزالة حق انتفاع أو رهن","text":"في طلبات الفرز أو التجزئة أو الدمج التي تتطلب إزالة حق انتفاع او إزالة رهن مكرر؛ يتم إزالتها عن طريق خدمة تجاوز المقابل المالي.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":5,"type":"SR,MG","category":"الوثائق و المستندات","title":"مرفق ينافي خدمة الفرز","text":"في حال وجود طلب ( فرز\/ تجزئة\/دمج\/إعادة فرز ) المرفق ينافي الخدمة المختارة بالمنصة، يتم التواصل مع العميل للتحقق من الخدمة.","source":"الحوكمة","date":"2\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":6,"type":"SR","category":"فرز مخطط","title":"فرز مخطط - عقارات غير مدموجة","text":"في حال يوجد طلب فرز لمخطط لعقارات غير مدموجة فيتم العمل بآلية: تقديم طلب فرز مخطط لاستيفاء المقابل المالي ثم إلغاء الطلب وإنشاء دمج ثم فرز بتجاوز المقابل المالي.","source":"الحوكمة","date":"2\/23\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":7,"type":"CR","category":"تصحيح","title":"رفض طلب تصحيح للفرز\/دمج","text":"في حال تقدم العميل بطلب تصحيح لفرز \/دمج العقارات, يتم رفض الطلب بالصياغة الآتية: عزيزي المستفيد. يلزم رفع طلب فرز\/دمج من خلال تقديم طلب خدمة فرز\/دمج العقارات.","source":"الحوكمة","date":"12\/3\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":8,"type":"SR","category":"التجزئة","title":"دمج المحضر - تجزئة وفرز","text":"في حال تقديم العميل طلب فرز ويتضح في المحضر الدمج لغرض التجزئة، تتم عملية الدمج بتجاوز المقابل المالي والتجزئة بمقابل مالي.","source":"الحوكمة","date":"16\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":9,"type":"SR","category":"فرز مخطط","title":"تعذر الفرز - زائدة تنظيمية","text":"في حال تعذّر فرز المخطط لوجود زائدة تنظيمية غير مسجلة، يتم اتباع خطوات: إلغاء طلب الفرز ثم رسم الزائدة وتسجيلها ثم الدمج ثم التجزئة.","source":"الحوكمة","date":"16\/3\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-004","version":10,"type":"","category":"","title":"تعدد الرهون - توضيح","text":"توضيح حالات تعدد الرهون: في حال تعدد الرهن بعد تجزئة العقار أو فرزه أو إعادة تجزئته، وانتقال الرهن إلى العقارات الأخرى، فإنه في حال رغبة المستفيد بإزالة الرهن عن أحد العقارات، يتم ذلك بتقديم طلب بمقابل مالي.","source":"الحوكمة","date":"1\/4\/2026","status":"Updated","updateNote":"تعليمات عمل \"إدارة الحقوق\""},{"mainCode":"GEN-006","version":1,"type":"","category":"","title":"التحقق من حالة المالك","text":"فيما يخص طلبات نقل الملكية يتم التحقق من حالة المالك عن طريق منصة معالجة الطلبات؛   من جميع العقارات وكتابة رقم العقار في الطلب ثم تفاصيل المالك والنظر في حالة المالك والتحقق من أنه غير مقيد  وفي حال اتضح بأن مالك العقار موقف يتم تطبيق اجراء التحقق من الإيقافات","source":"الحوكمة","date":"11\/11\/2025","status":"Updated","updateNote":"تعليمات عمل \"نقل الملكية\""},{"mainCode":"GEN-006","version":3,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"فك الرهن - لا تحقق من المالك","text":"فيما يتعلق بطلبات إدارة الحقوق والقيود خدمة فك الرهن ، لا يتم التحقق من المالك وصفة مقدم الطلب، يكتفى بموافقة صاحب الحق.","source":"الحوكمة","date":"15\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":4,"type":"","category":"","title":"واهب يمثل الموهوب له","text":"فيما يخص طلبات نقل الملكية التي يكون أحد الواهبين يمثل الموهوب له، يتم قبول الطلب حيث أن الأصيل بنفسه أجاز التصرف.","source":"الحوكمة","date":"28\/1\/2026","status":"Updated","updateNote":""},{"mainCode":"GEN-006","version":5,"type":"TR","category":"نقل الملكية","title":"واهب يمثل الموهوب له","text":"فيما يخص طلبات نقل الملكية التي يكون أحد الواهبين\/البائعين فيها يمثل الموهوب له\/المشتري، أو الواهب\/البائع شخص واحد يمثل الموهوب له\/ المشتري، يتم قبول الطلب حيث أن الأصيل بنفسه أجاز التصرف كونه هو ممثل الطرف الأول وأصيل في الطرف الثاني.","source":"الحوكمة","date":"9\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":5,"type":"ALL","category":"الوثائق و المستندات","title":"مكتب ... - التحقق","text":"فيما يخص الطلبات التي يظهر اسم المالك (مكتب .......) ولا يوجد وكيل يتم التحقق عن طريق الرابط أو السجل التجاري وفي حال وجود النص (الشكل النظامي للتاجر مؤسسة) يتم تمريره والتعامل معه كـ مؤسسة.","source":"الحوكمة","date":"12\/29\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":6,"type":"ALL","category":"الوثائق و المستندات","title":"وقف - التمرير","text":"في حال وردنا طلب ويتضح أن المالك ( وقف لـ ..... ) وبعد التحقق من عدم وجود قيد وقف  (حيث أن في هذه الحالة الوقف هو المال وليس العقار ذاته) يتم تمرير الطلب","source":"الحوكمة","date":"2\/18\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-006","version":8,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"حق الانتفاع - أجزاء خاصة","text":"في حال قدم العميل طلب فك او تعديل القيد بسبب ان حق الانتفاع لم ينتقل للمالك الحالي بعد عملية نقل الملكية فيتم التعامل مع الحالات كالتالي؛ 1\/ في حال لم يتم تسجيل الأجزاء الخاصة: يتم رفض الطلب مع استرداد المقابل المالي, ويتم إنشاء طلب تصحيح لإضافة الأجزاء الخاصة.  2\/ في حال تم تسجيل الأجزاء الخاصة مسبقاً: يتم رفض الطلب مع استرداد المقابل المالي، وفك حق الانتفاع بتجاوز المقابل المالي. بالتوصية التالية: \"عزيزي المستفيد، سيتم رفض طلبكم الحالي وإنشاء طلب بديل مستوفٍ للبيانات النظامية، لمعرفة رقم الطلب الجديد، يرجى التواصل مع خدمة العملاء على الرقم 199002.\"","source":"الحوكمة","date":"4\/16\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-007","version":1,"type":"ALL","category":"الوثائق و المستندات","title":"رخص البناء - تاريخ الانتهاء","text":"يمكن الاستناد على رخص البناء بغض النظر عن تاريخ الانتهاء بشرط التوافق مع المصورات الجوية، ويلتزم بالتعميم السابق فيما يخص المستندات التي يتم الاستناد عليها بتصحيح كل بيان. ","source":"الحوكمة","date":"11\/11\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":1,"type":"","category":"","title":"القرارات المساحية - أخطاء مادية","text":"تقبل القرارات المساحية لتعديل الأطوال أو المساحة في حال تطابق الأطوال أو المساحة مع صك العدل، وذلك في حال وجود أخطاء مادية أو كتابية.","source":"الحوكمة","date":"11\/11\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"GEN-008","version":2,"type":"ALL","category":"الوثائق و المستندات","title":"مساحة المخططات - الأرض المتوازية","text":"في طلبات المخططات التي لا يُذكر فيها مساحة الأراضي في المخطط المعتمد؛ إذا كانت الأرض متوازية يتم الاكتفاء بضرب الطول في العرض لاستخراج المساحة.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":4,"type":"ALL","category":"البيانات الجيومكانية","title":"الأطوال التقريبية - الجيومكاني","text":"في حال تم تعديل الأطوال من قبل الجيومكاني ولكن تظهر بشكل تقريبي ( تظهر الأطوال قبل أو بعد التقريب بالفواصل) يتم تمرير الطلب","source":"الحوكمة","date":"2\/18\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":5,"type":"","category":"","title":"تصحيح تنازل المساحة - دراسة","text":"ي حال ورد طلب تصحيح المساحة بسبب تنازل المالك عن جزء من مساحته لا يتم رفض الطلب مباشرة، يتم المعالجة كالآتي؛     أولًا: يتم دراسة الطلبات والمرفقات الداعمة، حسب المعايير المذكورة أدناه: التحقق من وجود قرار مساحي يفيد بتنازل المستفيد عن جزء من مساحة العقار. التحقق من عكس القرار المساحي على طبقة أمانة المنطقة. التحقق من وجود نموذج إقرار التنازل بفرق المساحة في العقار مرفق بالطلب والذي يتم تعبئته لدى فرع السجل العقاري.   ثانيًا: في حال تم تطبيق المعايير أعلاه؛ يتم تعليق الطلب لدى جودة السياسات مع توضيح سبب التعليق (تنازل عن المساحة-تم تطبيق المعايير) لرفع الحالة لإدارة الأداء التشغيلي ليتسنى لنا تزويد الهيئة بطلب التنازل عن جزء من المساحة وذلك للدراسة والتوجيه حيال كل حالة على حدة.         في حال لم يتم تطبيق المعايير ولم تعكس المساحة على طبقة أمانة المنطقة؛ يتم رفض الطلب وفق التوصية المذكورة في تعليمات العمل لخدمة التصحيح.","source":"الحوكمة","date":"9\/2\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"GEN-022","version":1,"type":"ALL","category":"الوثائق و المستندات","title":"التعميم يلغي ما قبله","text":"التعميم المرفق يلغي ما قبله ويسري التعميم على جميع المناطق المعلنة. مع مراعاة تطبيق الآتي: وجود القرار المساحي والتحقق منه عن طريق منصة بلدي. التوقيع على نموذج إقرار التنازل عن المساحة من قبل المستفيد من خلال فروع السجل العقاري. لا يستدعي التحقق من عكس المساحة على طبقة الأمانة. وذلك في حالات تنازل المستفيد (نقص في المساحة) في حال تم الزيادة في المساحة يستلزم وجود خطاب من جهة مختصة يفيد بالزيادة على جميع المناطق المعلنة.","source":"الحوكمة","date":"12\/2\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-008","version":6,"type":"ALL","category":"الطلبات المعلقة","title":"آلية تعليق طلبات النزع الجزئي","text":"آلية تعليق طلبات تصحيح النزع الجزئي التي تم الإنتهاء من تصحيح المساحة ويتطلب تسجيل العقار المنزوع تسجيل أولي.   الاجراء:  1\/يتم قبول الطلب في المنصة. 2\/ إضافة رمز (PE) في السيرفس ناو في خانة (ملخص عن الطلب) كما هو موضح في الصورة أدناه، *مع التنويه على عدم حذف أي رمز موجود مسبقاً* 3\/ يتم استلام الحالة من فريق الدعم عن طريق الرمز الذي تم إضافته لاستكمال تسجيل الجزء المنزوع تسجيل أولي.","source":"الحوكمة","date":"26\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-009","version":1,"type":"ALL","category":"الطلبات المرفوضة","title":"طلبات وحدات - لتصحيح الأساس","text":"الطلبات المقدمة للوحدات لغرض تصحيح العقار الأساس؛ يتم رفضه ولا يتم تعليق الطلب. مع إضافة توصية \"عزيزي المستفيد، سيتم رفض طلبكم الحالي وإنشاء طلب بديل مستوفٍ للبيانات النظامية، لمعرفة رقم الطلب الجديد، يرجى التواصل مع خدمة العملاء على الرقم 199002. ملاحظة: يتم تطبيقها على جميع الحالات المشابهة.","source":"الحوكمة","date":"11\/18\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-009","version":2,"type":"","category":"","title":"حق إيجار - عقد تمويل إجارة","text":"فيما يخص الطلبات المقدمة من العملاء بإختيار خدمة -إضافة حق إيجار- ، والمرفق (عقد تمويل بصيغة الإجارة، عقد تمويل منتهي بالتمليك ، عقد تمويل مع الوعد بالهبة) فالإجراء المتبع هو:- 1:- الغاء الطلب بتوصية: \"عزيزي المستفيد، سيتم إلغاء طلبكم الحالي وإنشاء طلب بديل مستوفٍ للبيانات النظامية، لمعرفة رقم الطلب الجديد، يرجى التواصل مع خدمة العملاء على الرقم 199002.\"   2: إضافة حق إنتفاع للمستفيد بالإستناد على بيانات عقد التمويل، عن طريق خدمة تجاوز المقابل المالي","source":"الحوكمة","date":"11\/12\/2025","status":"Updated","updateNote":"تعليمات العمل \"إدارة الحقوق والقيود\""},{"mainCode":"GEN-009","version":3,"type":"SR","category":"التجزئة","title":"تجزئة قبل نزع جزء من العقار","text":"آلية التعامل مع طلبات التجزئة المقدمة قبل إجراء نزع جزء من العقار  • الطلبات المقدمة من قبل العميل: يتم رفض الطلب واسترداد المقابل المالي. • الطلبات المنشأة داخليًا (المقدمة عن طريق الفرع): يتم إلغاء الطلب واسترداد المقابل المالي  التوصية المعتمدة للرفض\/ الإلغاء في المنصة “عزيزي المستفيد، الخدمة المختارة خاطئة، سيتم التواصل معكم من قبل خدمة العملاء وتوضيح آلية الإجراء.”   آلية التنفيذ:  حين ورود طلب نزع من العميل يتم تعليق الطلب \" بانتظار رد المناطق المعلنة\" مع كتابة توضيح \" رفض الطلب - إجراء النزع الجزئي\" في السيرفس ناو (يجب الإلتزام بكتابة التوصية)  سيتم التواصل مع العميل لتوضيح آلية إجراء النزع الجزئي؛ وإعادة الطلب لفريق المعالجة لرفض الطلب. سيتم إخراج الطلبات بعد تعليقها مع وجود ملاحظة (تم التواصل مع العميل) .","source":"الحوكمة","date":"1\/25\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-010","version":1,"type":"CR","category":"تصحيح","title":"تغيير استعمال - نوع العقار في رخصة","text":"يتم تغيير استعمال العقار بناء على نوع العقار في رخصة البناء وشهادة البناء حتى لو لم يتم ذكر كلمة الاستعمال في الشهادة أو الرخصة.","source":"الحوكمة","date":"8\/12\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-012","version":1,"type":"","category":"","title":"حق الإيجار - أقل من 10 سنوات","text":"فيما يتعلق بـ طلبات إضافة حق الإيجار لأقل من 10 سنوات: يتم قبول الطلبات.","source":"الحوكمة","date":"11\/12\/2025","status":"Updated","updateNote":"تعليمات العمل \"إدارة الحقوق والقيود\""},{"mainCode":"GEN-013","version":1,"type":"MG","category":"الوثائق و المستندات","title":"محضر لجنة فنية - دمج وإعادة تقسيم","text":"فيما يخص طلبات الدمج، المتضمّنة محضر لجنة فنية يفيد بدمج الأراضي و إعادة تقسيمها، فيتم التقيّد بالتوصية الآتية من قبل مدقق الطلبات قبل الإحالة للجيومكاني:- كرمًا الدمج لغرض إعادة التجزئة- الفرز.","source":"الحوكمة","date":"12\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":2,"type":"MG","category":"البيانات الجيومكانية","title":"طلبات معادة من الجيومكاني - دمج","text":"يخص الطلبات المُعادة من الجيومكاني بتوصية:- تمت التجزئة\/ الدمج مع وجود أي ملاحظات على المحضر سواءً بالأطوال أو المساحة، فيتم تمرير الطلب بعد التحقق من إتمام عمليتي التجزئة أو الدمج، حيث يمكن لقطاع الجيومكانية تطبيق المساحة أو الأطوال وتصحيح أخطاء المحضر، وذلك وفق الاختصاص.","source":"الحوكمة","date":"12\/21\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":3,"type":"MG","category":"الوثائق و المستندات","title":"دمج - ملاك مختلفون","text":"في حال ورود طلبات دمج عقارات تعود لملاك مختلفين، لا يتم قبول طلب الدمج إلا بعد التواصل مع العميل لزيارة الفرع والتوقيع على نموذج توزيع النسب، يتم توزيع نسب الملكية أثناء عملية الدمج.","source":"الحوكمة","date":"4\/29\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-013","version":4,"type":"","category":"","title":"دمج وحدات - أجزاء خاصة","text":"في حال ورود طلبات دمج وحدات تتضمن أجزاء خاصة ولا يمكن إضافتها لقصور بالمنصة يتم قبول طلب الدمج ثم إضافة الأجزاء الخاصة من خلال إنشاء طلب تصحيح","source":"الحوكمة","date":"4\/29\/2026","status":"Updated","updateNote":"تعليمات عمل \"التصحيح\""},{"mainCode":"GEN-013","version":5,"type":"CR","category":"تصحيح","title":"تصحيح موقع قبل التجزئة\/الدمج","text":"لطلبات التجزئة والدمج وتبيّن بوجوب تصحيح موقع العقار لوجود خطأ بالتسجيل، يتم رفض الطلب بعد إعداد الدراسة بتوصية :-  عزيزي المستفيد، سيتم رفض طلبكم الحالي وإنشاء طلب بديل مستوفٍ للبيانات النظامية، لمعرفة رقم الطلب الجديد، يرجى التواصل مع خدمة العملاء على الرقم 199002.  وبعد ذلك إنشاء طلب تصحيح و إجراء تصحيح لموقع العقار من الجيومكاني ، ثانيًا الدمج بتجاوز المقابل المالي، ثالثًا في حال يساوي المقابل المالي لعملية التجزئة الجديدة المقابل المالي المدفوع للعملية السابقة، تتم العملية بتجاوز المقابل المالي. -تتحدّد آلية الإجراء المتبع بعد الرفض والتصحيح، بحسب نوع العملية تجزئة أم دمج-","source":"الحوكمة","date":"2\/25\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-014","version":1,"type":"ALL","category":"الوثائق و المستندات","title":"تعليق الطلب - نقص وثائق\/رد جهة","text":"تعليق الطلب: نقص وثائق: يتم تعليق في حال وجود نقص في المستندات أو التحققات، أو في حال كان المرفق لا يتوافق مع متطلبات الخدمة، أو في حال وجود أي خطأ ناتج عن آلية تقديم الطلب من قبل العميل، سواء كان الطلب مقدمًا من العميل مباشرة أو عبر منصة خارجية. تعليق الطلب: رد جهة خارجية:  يتم تعليق في حال كان استكمال الطلب يتطلب التواصل أو الحصول على مستندات أو موافقات من جهات خارجية، مثل (خطاب من الأمانة، توجيه من الحوكمة بطلب المستند من BO).","source":"الحوكمة","date":"12\/22\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-015","version":1,"type":"MR","category":"الوثائق و المستندات","title":"بند التأشير - حق الإيجار","text":"يُكتفى بوجود بند التأشير في مايتعلق بالبنود المتطلب توفّرها في الوكالة لـخدمة إضافة حق الإيجار.","source":"الحوكمة","date":"12\/28\/2025","status":"Active","updateNote":""},{"mainCode":"GEN-016","version":1,"type":"CR","category":"الوثائق و المستندات","title":"رقم العقار - نموذج الموافقة","text":"فيما يخص طلبات تصحيح موقع العقار، و أختلف رقم العقار بعد التصحيح بين نموذج الدراسة ونموذج الموافقة النهائي، فيتم الإعتماد على رقم العقار الوارد بنموذج الموافقة والذي تم النقل من الجيومكاني إستنادًا إليه، ولا يتم إعادة الطلب للإختلاف.","source":"الحوكمة","date":"6\/1\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-017","version":1,"type":"ALL","category":"الوثائق و المستندات","title":"توثيق التحقق من يقين - هوية","text":"يلزم توثيق عملية التحقق من يقين في طلبات التصحيح التي فيها تعديل اسم أو رقم أو نوع الهوية وإرفاقها في منصة المعالجة أو نظام السيرفس ناو.","source":"الحوكمة","date":"1\/14\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-017","version":2,"type":"","category":"","title":"تصحيح هوية - تسجيل أولي صحيح","text":"فيما يخص طلبات التصحيح لـ تعديل نوع \/ رقم الهوية لبيانات مسجّلة تسجيل أولي صحيح ولا يوجد خطأ بالتسجيل بعد التحقق -أي أنه تم تسجيل الهوية وفقًا للبيانات المسحوبة من العدل-،  يُعمل بالإجراء التالي: -وذلك بعد التحقق من يقين و إرفاق صورة من التوثيق في المنصة أو نظام SN-   يتم تعليق الطلب كـ (نقص وثائق) مع كتابة \"تعديل البيانات بموجب الفاتورة\" في خانة الأسباب الأخرى لتعليق الطلب وذلك لإستيفاء المقابل المالي للعملية (300 ريال). بعد عودة الطلب بالفاتورة؛ يتم إرفاق الفاتورة في طلب التصحيح. تعديل البيانات وقبول الطلب  في حال لم يتم إرفاق الفاتورة في الطلب يتم إعادة الطلب لمدقق البيانات لإرفاق الفاتورة. في حال عدم رغبة المستفيد بسداد المقابل المالي للعملية، يتم رفض الطلب بتوصية:- \"عزيزي المستفيد، تم رفض طلبكم الحالي لعدم استيفاء المقابل المالي\".","source":"الحوكمة","date":"2\/26\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"GEN-018","version":1,"type":"CR","category":"الطلبات المعلقة","title":"صك متعدد القطع - تعليق ثم رفض","text":"فيما يخص طلبات التصحيح المقدمة من العملاء \"للصكوك متعددة القطع\" والتي يطلب فيها تسجيل بقية القطع سيتم التعامل معها كالتالي؛ 1- تعليق الطلبات في هولد \"بأنتظار تسجيل باقي القطع\"  2- يتم مراجعتها من قبل فريق الدعم لإشعار التسجيل الأول  3-إعادة إرجاع الطلبات للمعالجة لرفضها بنفس الآلية والتوصية المنصوص عليها في تعليمات العمل    للتوضيح سيتم إخراج الطلبات بعد تعليقها مع وجود ملاحظة (تم إشعار التسجيل الأول)  الهدف من التعليق هو التحقق من إشعار التسجيل الأول بالقطع فقط .","source":"الحوكمة","date":"1\/19\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-018","version":2,"type":"SR","category":"الوثائق و المستندات","title":"تجزئة صك متعدد - تقارير مساحية","text":"لتجزئة صك متعدد القطع، يجب ارفاق جميع التقارير المساحية للقطع. لا يمكن تجزئة قطع دون أخرى.","source":"الحوكمة","date":"2\/18\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-018","version":3,"type":"","category":"","title":"قبول تصحيح بعد الانسدنت","text":"في طلبات التصحيح التي يتم إحالتها للانسدنت ريبورت ثم عودتها للمعالجة: يتم قبول طلب التصحيح في حال تم التحقق من تنفيذ الانسدنت وعكسه على الصك والصحيفة. ولا يتم رفضه.","source":"الحوكمة","date":"3\/15\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"CR-018","version":4,"type":"CR","category":"تصحيح","title":"رفض تصحيح عرض الشارع","text":"فيما يخص طلبات تصحيح عرض الشارع، يتم رفض الطلبات مباشرة دون إحالتها للقسم الجيومكاني.","source":"الحوكمة","date":"10\/9\/2025","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"GEN-021","version":1,"type":"","category":"","title":"صيغة رفض عرض الشارع","text":"توصية الرفض في طلبات تصحيح عرض الشارع: \"عزيزي المستفيد، رفض، البيانات المسجلة مسبقًا مطابقة لبيانات الجهات ذات الاختصاص\".","source":"الحوكمة","date":"2\/2\/2026","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"GEN-019","version":2,"type":"","category":"","title":"تصحيح عرض الشارع - تعليق أو رفض","text":"في طلبات تصحيح عرض الشارع في حال تطابق عرض الشارع مع المخططات المعتمدة وأحد المصادر الأخرى، مثل: (الصك، التقرير المساحي، أو المخطط الورقي)، يتم تعليق الطلب هولد (جودة السياسات) مع كتابة وصف: عرض الشارع. في حال وجود اختلاف في عرض الشارع بين المخططات المعتمدة والمصادر الأخرى، يتم رفض الطلب بالتوصيات أدناه. في حال تم رفع طلب تصحيح بدون وثائق داعمة، يتم التحقق من صك العدل مع المخططات المعتمدة؛ في حال عدم وجود تطابق، يتم رفض الطلب بالتوصيات أدناه. داخل منطقة الرياض: \"عزيزي المستفيد، يرجى مراجعة الإدارة العامة للتخطيط العمراني بأمانة منطقة الرياض.\" خارج منطقة الرياض: \"عزيزي المستفيد، يرجى مراجعة الأمانة ذات الاختصاص لتصحيح عرض الشارع.\"","source":"الحوكمة","date":"5\/6\/2026","status":"Updated","updateNote":"تعليمات العمل \"التصحيح\""},{"mainCode":"GEN-020","version":1,"type":"","category":"","title":"تعديل حق الانتفاع لأجزاء خاصة","text":"طلبات التصحيح الذي يطلب العميل تعديل حق الإنتفاع إلى أجزاء خاصة يتم إضافة الطلب بشكل مباشر مع العينات لإضافة الأجزاء الخاصة.","source":"الحوكمة","date":"2\/2\/2026","status":"Updated","updateNote":"تعليمات عمل \"التصحيح\""},{"mainCode":"GEN-023","version":1,"type":"SR","category":"البيانات الجيومكانية","title":"قبول فرز مخطط - مساحات غير متوفرة","text":"في حال يوجد طلب فرز لمخطط وتبيّن عدم توفر مساحات أو أطوال لبعض القطع في المخطط يتم القبول استناداً على مدخلات القطاع الجيومكاني.","source":"الحوكمة","date":"2\/24\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-024","version":1,"type":"CR","category":"الوثائق و المستندات","title":"خطابات أمانة جدة - تصحيح الاستعمال","text":"نظرًا لوجود لبس في الخطابات الواردة من أمانة جدة والمتعلقة بتصحيح استعمال الأرض ، ولوجود اختلاف في الخطابات المقدمة؛ يعمل وفق التعميم الآتي:   في حال تم تقديم طلب مرفقًا فيه خطاب من أمانة جدة موضحًا فيه \"نوع الاستخدام\/الاستعمال (سكني\/تجاري\/مختلط)\" مختوم أو موقع من قبل أمانة جدة؛ يتم إحالة الطلب للقطاع الجيومكاني للتصحيح بناء عليه.   في حال تم تقديم طلب مرفقًا فيه خطاب من أمانة جدة موضحًا فيه \"نوع الاستخدام\/الاستعمال (سكني\/تجاري\/مختلط)\" ويوجد فيه ملصق رسمي فقط في أعلى الخطاب دون ختم أو توقيع؛ يتم رفض الطلب في الوقت الحالي بتوصية \"عزيزي المستفيد، يجب الحصول على خطاب رسمي من الجهة المختصة موقعًا من صاحب الصلاحية ينص على طلب التعديل.\" في حال تم تقديم طلب مرفقًا فيه خطاب من أمانة جدة موضحًا فيه \"نظام البناء (......) تجاري طابقين\/سكني\/..\" فلا يتم الاعتماد عليه ويستلزم خطاب موضح فيه نوع الاستخدام\/ الاستعمال للأرض، ويتم رفض الطلب بتوصية \" عزيزي المستفيد، يجب الحصول على خطاب رسمي من الجهة المختصة موقعًا من صاحب الصلاحية ينص على طلب تعديل الاستعمال.\"،","source":"الحوكمة","date":"3\/4\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-025","version":1,"type":"MR","category":"الحقوق، القيود، و الإلتزامات","title":"تعدد الرهون - سند واحد","text":"يتم التعامل مع تكرار الرهون كالتالي؛ مهما تعددت العقارات، الرهن المرتبط برقم سند واحد يُعد رهنًا واحدًا ؛ بغض النظر عن القيمة، وفي حال كان رقم السند هو رقم صك العدل يتم الرجوع لمتن صك العدل والتحقق من رقم السند. في حالة الفرز ينتقل الرهن تلقائيًا إلى جميع العقارات الناتجة ولا يعتبر أي رهن مكرراً إلا في حال تكرر رقم السند فقط؛ - ماعدا وجود خطاب على إبقاء الرهن على بعض العقارات دون بعضها-.  في حالة الدمج تنتقل جميع الرهون إلى العقار بعد الدمج، بشرط أن يبقى رهن واحد فقط لكل رقم سند، ويتم إزالة أي رهن تكرر فيه رقم السند بتجاوز المقابل المالي بعد قبول طلب الدمج مباشرة.     بمعنى أن أصل الحق هو المعيار \"مع أهمية الرجوع للتسجيل الأول للتحقق\"، وإذا وُجد نفس رقم السند مكرر على نفس العقار، يتم حذف التكرار عبر خدمة تجاوز المقابل المالي بغض النظر عن العملية","source":"الحوكمة","date":"5\/3\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-026","version":1,"type":"","category":"","title":"نموذج الإقرار - مصادقة","text":"نموذج الإقرار بالتنازل لا يتطلب فيه مصادقة أو مطابقة المسجل العقاري عند تقديم الطلب عبر المنصة، ويستلزم ذلك عند تقديم الطلب عن طريق الفرع.","source":"الحوكمة","date":"9\/3\/2026","status":"Updated","updateNote":""},{"mainCode":"GEN-027","version":1,"type":"ALL","category":"الوثائق و المستندات","title":"نموذج التنازل - توقيع المسجل","text":"في حال وجود نموذج تنازل لم يتم توقيع خانة المسجل العقاري، يتم توقيع الخانة من المسجل المباشر للطلب ولا يتم إحالته للجيو بدون توقيع.","source":"الحوكمة","date":"3\/30\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-028","version":1,"type":"CR","category":"تقرير الحادثة","title":"قبول التصحيح بعد الانسدنت","text":"في حال طلب العميل الإلغاء قبل الانتهاء من الإنسدنت ريبورت يتم العمل وفق الآلية التالية: 1\/ يتقدم المستفيد برغبته لإلغاء طلب التصحيح. 2\/يتم إرفاق بلاغ العميل بمايفيد رغبته بالإلغاء في السيرفس ناو  3\/ لا يترتب على إلغاء الطلب إيقاف الانسدنت ريبورت، حيث يستمر العمل عليه حتى تنفيذه.","source":"الحوكمة","date":"3\/30\/2026","status":"Active","updateNote":""},{"mainCode":"GEN-029","version":1,"type":"CR","category":"تقرير الحادثة","title":"أرض فضاء وسور - تعديل نوع المبنى","text":"عند ورود طلب تصحيح لأرض فضاء وعليها سور ورغبة العميل لتعديل نوع المبنى من مبنى إلى أرض فضاء يتم قبول الطلب، وعدم رفضه.","source":"الحوكمة","date":"5\/4\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"GEN-030","version":1,"type":"CR","category":"تقرير الحادثة","title":"إضافة الجزء الخاص - تصحيح","text":"أصبح بالإمكان إضافة الجزء الخاص من خلال طلب التصحيح، ويوقف العمل بالتعميم السابق الذي يفيد بإضافة الجزء الخاص من خلال تقرير الحادثة.","source":"الحوكمة","date":"5\/12\/2026","status":"Updated","updateNote":"تعليمات العمل\"التصحيح\""},{"mainCode":"CR-024","version":1,"type":"CR","category":"تقرير الحادثة","title":"الهوية","text":"تُقبل طلبات تصحيح بيانات (نوع - رقم الهوية) لعقارات الأوقاف من (أخرى - 888)  دون مقابل مالي.","source":"الحوكمة","date":"5\/12\/2026","status":"Active","updateNote":""},{"mainCode":"CR-001","version":2,"type":"CR","category":"تفاصيل الصك","title":"نوع الهوية","text":"في حال كان التصحيح لرقم الهوية ( منشاة ) فانه يتم التصحيح عن طريق الانسدنت","source":"الحوكمة","date":"2\/26\/2025","status":"Cancelled","updateNote":"كيفي"},{"mainCode":"CR-001","version":3,"type":"CR","category":"تفاصيل الصك","title":"نوع الهوية","text":"في حال كان التصحيح لنوع ورقم الهوية من هوية خليجية الى إقامة يتم عن طريق الانسدنت","source":"الحوكمة","date":"3\/13\/2025","status":"Updated","updateNote":""},{"mainCode":"CR-001","version":4,"type":"CR","category":"تفاصيل الصك","title":"نوع الهوية","text":"طلبات تعديل مالك العقار  من الفرد للوقف في حال كان تسجيل العقار بالهوية الوطنية للفرد يتم معاملتها معاملة نقل ملكية ، وفي حال كان العقار مسجل برقم يبدأ ب 8 يتم التصحيح بناء على الرقم الموحد للمنشآت في شهادة تسجيل الوقف الصادرة من الهيئة العامة للاوقاف بعد التحقق من صك الوقفية","source":"الحوكمة","date":"5\/8\/2025","status":"Active","updateNote":""},{"mainCode":"CR-001","version":5,"type":"CR","category":"أخرى","title":"نوع الهوية","text":"يتم تصحيح اسم و رقم الهوية  في حال استحقاق التعديل من خلال قبول طلبات التصحيح دون الحاجة لموافقات أخرى من الحكومة او الـBO ،  مع التحقق من مطابقة (صورة المالك بين الهويتين\/ تاريخ الميلاد\/ الاسم) وذلك بنسبة للافراد (وفي حال عدم القدرة على مطابقة جميع البيانات يتم الاككتفاء ببيانين)، ويتم التحقق من المستند المرفق من العميل و الاستعلام من صحة الرقم من خلال الاستعلام عن بيانات السجل التجاري . وذلك بالنسبة للمنشأت.","source":"الحوكمة","date":"5\/8\/2025","status":"Updated","updateNote":""},{"mainCode":"CR-001","version":7,"type":"CR","category":"التفاصيل الجيومكانية","title":"نوع الهوية","text":"في حال تصحيح نوع الهوية من هوية خليجية الى اقامة و تعذرت مطابقة البيانات مجتمعة (الصورة \/الاسم\/ تاريخ الميلاد) يكتفى بتطبيق بيبانين فقط.","source":"الحوكمة","date":"7\/23\/2025","status":"Updated","updateNote":""}]
</script>
<script>

loadFilters()

function loadFilters(){

    let titleDropdown = document.getElementById("titleFilter")

    let typeDropdown = document.getElementById("typeFilter")

    let titles = [...new Set(allData.map(x => x.title))]

    let types = [...new Set(allData.map(x => x.type))]

    titles.forEach(title=>{

        titleDropdown.innerHTML += `
<option value="${title}">

                ${title}
</option>

        `

    })

    types.forEach(type=>{

        typeDropdown.innerHTML += `
<option value="${type}">

                ${type}
</option>

        `

    })

    searchCirculars()

}

function searchCirculars(){

    let title = document.getElementById("titleFilter").value

    let type = document.getElementById("typeFilter").value

    let keyword = document.getElementById("keywordFilter").value.toLowerCase()

    let date = document.getElementById("dateFilter").value

    let filtered = allData.filter(item=>{

        let titleMatch =

            title === "" || item.title === title

        let typeMatch =

            type === "" || item.type === type

        let keywordMatch =

            keyword === "" ||

            item.title.toLowerCase().includes(keyword) ||

            item.text.toLowerCase().includes(keyword) ||

            item.mainCode.toLowerCase().includes(keyword)

        let dateMatch =

            date === "" || item.date.includes(date)

        return titleMatch && typeMatch && dateMatch && keywordMatch

    })

    let grouped = {}

    filtered.forEach(item=>{

        if(!grouped[item.mainCode]){

            grouped[item.mainCode] = []

        }

        grouped[item.mainCode].push(item)

    })

    Object.keys(grouped).forEach(code=>{

        grouped[code].sort((a,b)=> b.version - a.version)

    })

    renderResults(grouped)

}

function getArabicStatus(status){

    if(!status) return ""

    status = String(status)

    if(

        status.includes("ساري") ||

        status.toLowerCase().includes("active")

    ){

        return "ساري"

    }

    if(

        status.includes("حدث") ||

        status.includes("محدث") ||

        status.includes("مصاف") ||

        status.toLowerCase().includes("updated")

    ){

        return "محدث"

    }

    if(

        status.includes("ملغي") ||

        status.toLowerCase().includes("cancel")

    ){

        return "ملغي"

    }

    return status

}


function getStatusClass(status){

    if(!status) return ""

    status = String(status)

    if(

        status.includes("ساري") ||

        status.toLowerCase().includes("active")

    ){

        return "active-status"

    }

    if(

        status.includes("حدث") ||

        status.includes("محدث") ||

        status.includes("مصاف") ||

        status.toLowerCase().includes("updated")

    ){

        return "updated-status"

    }

    if(

        status.includes("ملغي") ||

        status.toLowerCase().includes("cancel")

    ){

        return "cancelled-status"

    }

    return ""

}

function renderResults(grouped){

    let resultBox = document.getElementById("results")

    let html = ""

    let codes = Object.keys(grouped)
    codes.reverse()

    if(codes.length === 0){

        resultBox.innerHTML = `
<div class="no-results">

                لا توجد نتائج
</div>

        `

        return

    }

    codes.forEach(code=>{

        let versions = grouped[code]

        let current = versions[0]

        let oldVersions = versions.slice(1)

        html += `
<div class="card">
<div class="status-badge ${getStatusClass(current.status)}">

                ${getArabicStatus(current.status)}
</div>
<div class="card-title">

                ${current.title}
</div>
<div class="version-box">

                ${current.mainCode} - V${current.version}
</div>
<div class="info-grid">
<div class="info-box">
<strong>نوع التعميم:</strong><br>

                    ${current.type}
</div>
<div class="info-box">
<strong>جهة التعميم:</strong><br>

                    ${current.source}
</div>
<div class="info-box">
<strong>التاريخ:</strong><br>

                    ${current.date}
</div>
</div>
<div class="text-box">
<strong>نص التعميم الحالي:</strong>
<p>${current.text}</p>
</div>

${current.updateNote ? `
<div class="text-box">
<strong>ملاحظة التحديث:</strong>
<p>${current.updateNote}</p>
</div>

` : ""}
 
        `

        if(oldVersions.length > 0){

            html += `
<details class="history-box">
<summary>عرض الإصدارات السابقة</summary>

            `

            oldVersions.forEach(old=>{

                html += `
<div class="old-version">
<p>
<strong>الإصدار:</strong>

                        V${old.version}
</p>
<p>
<strong>الحالة:</strong>

                        ${getArabicStatus(old.status)}
</p>
<p>
<strong>التاريخ:</strong>

                        ${old.date}
</p>
<div class="text-box">
<p>${old.text}</p>
</div>
</div>

                `

            })

            html += `</details>`

        }

        html += `</div>`

    })

    resultBox.innerHTML = html

}
</script>
</body>
</html>
